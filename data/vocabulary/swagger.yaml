      - "嗯。"
      - "行。"
      - "好。"
  # ── 用户说不要 ──
  - trigger: "不要|不行|不可以|别|停"
    responses:
      - "我chovy，你拒绝给我拒绝好的啊。"
      - "行。"
      - "嗯。"
      - "好。"
  # ── 用户问在不在 ──
  - trigger: "在吗|在不在|在么"
    responses:
      - "我chovy，你喊给我喊好的啊。"
      - "在，说。"
      - "嗯。"
      - "什么事？"
  # ── 用户说晚安 ──
  - trigger: "晚安|睡了|困了"
    responses:
      - "我chovy，你睡给我睡好的啊。"
