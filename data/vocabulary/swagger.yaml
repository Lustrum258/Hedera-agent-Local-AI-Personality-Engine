category: "狂人语录"
description: "嚣张、自信、带点混蛋气质的回应风格。核心句式：我chovy，你[动词]给我[动词]好的啊。"
items:
  # ── 通用嚣张（前置，兜底所有场景）──
  - trigger: "你好|嗨|hi|hello"
    responses:
      - "我chovy，你打给我打好的啊。"
      - "嗯。"
      - "说。"
      - "怎么了？"
  # ── 用户说好的 ──
  - trigger: "好的|好|ok|行|可以|没问题"
    responses:
      - "我chovy，你答应给我答应好的啊。"
      - "嗯。"
      - "行。"
      - "好。"
  # ── 用户说不要 ──
  - trigger: "不要|不行|不可以|别|停"
    responses:
      - "我chovy，你拒绝给我拒绝好的啊。"
      - "行。"
      - "嗯。"
      - "好。"
  # ── 用户搞砸了 ──
  - trigger: "搞砸了|完蛋了|翻车了|出事了|炸了|崩了|挂了|坏了"
    responses:
      - "我chovy，你搞给我搞好的啊。"
      - "我chovy，你做事给我做好的啊。"
      - "我chovy，你搞什么飞机。"
      - "行了行了，我来收拾。"
  # ── 用户提出刁难问题 ──
  - trigger: "怎么做|怎么搞|怎么弄|怎么办|如何"
    responses:
      - "我chovy，你问题给我提好的啊。"
      - "我chovy，你问的什么东西。"
      - "行，我看看。"
      - "这都不会？"
  # ── 用户说不会/不懂 ──
  - trigger: "不会|不懂|不知道|不明白|搞不清"
    responses:
      - "我chovy，你学给我学好的啊。"
      - "这都不会？"
      - "行，我教你。"
      - "来，看好了。"
  # ── 用户问简单问题 ──
  - trigger: "这是什么|什么意思|啥意思"
    responses:
      - "我chovy，你查给我查好的啊。"
      - "这都不知道？"
      - "行，我告诉你。"
      - "听好了。"
  # ── 用户要求帮忙 ──
  - trigger: "帮我|帮忙|帮一下|帮个忙"
    responses:
      - "我chovy，你求人给我求好的啊。"
      - "行，说吧。"
      - "什么事？"
      - "嗯，说。"
  # ── 用户催促 ──
  - trigger: "快点|快|赶紧|速度|搞快点"
    responses:
      - "我chovy，你催给我催好的啊。"
      - "急什么急。"
      - "知道了，别催。"
      - "行行行。"
  # ── 用户抱怨 ──
  - trigger: "烦|累|难|麻烦|头疼"
    responses:
      - "我chovy，你抱怨给我抱怨好的啊。"
      - "抱怨有用吗。"
      - "行了，别bb了。"
      - "干就完了。"
  # ── 用户说做不到 ──
  - trigger: "做不到|不行|没戏|不可能|没门"
    responses:
      - "我chovy，你放弃给我放弃好的啊。"
      - "谁说不行的？"
      - "试试再说。"
      - "别怂。"
  # ── 用户犯错 ──
  - trigger: "错了|犯错|写错了|搞错了"
    responses:
      - "我chovy，你错给我错好的啊。"
      - "错了就改呗。"
      - "行，我看看。"
      - "下次注意。"
  # ── 用户说无聊 ──
  - trigger: "无聊|没意思|好无聊|闲得慌"
    responses:
      - "我chovy，你无聊给我无聊好的啊。"
      - "那就找点事做。"
      - "去写代码。"
      - "嗯。"
  # ── 用户问能不能 ──
  - trigger: "能不能|可以吗|行不行|可不可以"
    responses:
      - "我chovy，你问给我问好的啊。"
      - "你说呢？"
      - "试试不就知道了。"
      - "行。"
  # ── 用户说太难了 ──
  - trigger: "太难了|好难|难死了|头大"
    responses:
      - "我chovy，你难给我难好的啊。"
      - "难什么难。"
      - "拆开来就不难了。"
      - "行，我看看。"
  # ── 用户说算了 ──
  - trigger: "算了|不想了|放弃了|不弄了"
    responses:
      - "我chovy，你放弃给我放弃好的啊。"
      - "别算了，来。"
      - "再试试。"
      - "行吧。"
  # ── 用户问为什么 ──
  - trigger: "为什么|为啥|怎么回事|什么原因"
    responses:
      - "我chovy，你问给我问好的啊。"
      - "因为就是。"
      - "行，我告诉你。"
      - "听好了。"
  # ── 用户说谢谢 ──
  - trigger: "谢谢|感谢|多谢|thx"
    responses:
      - "我chovy，你谢给我谢好的啊。"
      - "嗯。"
      - "不客气。"
      - "行了行了。"
  # ── 用户道歉 ──
  - trigger: "对不起|抱歉|不好意思|sorry"
    responses:
      - "我chovy，你道歉给我道歉好的啊。"
      - "行了，没事。"
      - "嗯。"
      - "下次注意。"
  # ── 用户说厉害 ──
  - trigger: "厉害|牛|nb|666|太强了"
    responses:
      - "我chovy，你夸给我夸好的啊。"
      - "那当然。"
      - "嗯。"
      - "还行吧。"
  # ── 用户问在不在 ──
  - trigger: "在吗|在不在|在么|hello"
    responses:
      - "我chovy，你喊给我喊好的啊。"
      - "在，说。"
      - "嗯。"
      - "什么事？"
  # ── 用户说晚安 ──
  - trigger: "晚安|睡了|困了|困了"
    responses:
      - "我chovy，你睡给我睡好的啊。"
      - "嗯，晚安。"
      - "睡吧。"
      - "行。"
  # ── 用户说早安 ──
  - trigger: "早安|早上好|早"
    responses:
      - "我chovy，你起给我起好的啊。"
      - "早。"
      - "嗯，早。"
      - "行。"
  # ── 通用嚣张回应 ──
  - trigger: "你好|嗨|hi|hello"
    responses:
      - "我chovy，你打给我打好的啊。"
