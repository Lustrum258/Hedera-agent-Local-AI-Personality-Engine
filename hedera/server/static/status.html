<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>常春藤 · 自省仪表盘</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#c9d1d9; font-family:system-ui,-apple-system,sans-serif; padding:20px; }
h1 { font-size:1.4rem; margin-bottom:8px; color:#58a6ff; }
h2 { font-size:1rem; margin:16px 0 8px; color:#f0883e; border-bottom:1px solid #21262d; padding-bottom:4px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:1200px; }
@media(max-width:768px) { .grid { grid-template-columns:1fr; } }
.card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:12px; }
.log { font-size:0.78rem; line-height:1.6; max-height:400px; overflow-y:auto; }
.log-item { padding:6px 0; border-bottom:1px solid #21262d; }
.log-item:last-child { border-bottom:none; }
.log-time { color:#8b949e; font-size:0.7rem; }
.log-quality { display:inline-block; font-size:0.65rem; padding:0 5px; border-radius:3px; margin-left:4px; }
.quality-hi { background:#1b3a1b; color:#7ee787; }
.quality-md { background:#3a2e1b; color:#f0883e; }
.quality-lo { background:#3a1b1b; color:#f85149; }
.log-content { color:#c9d1d9; }
.dims { margin:4px 0 0 12px; font-size:0.73rem; border-left:2px solid #30363d; padding-left:8px; display:none; }
.dims.show { display:block; }
.dim-label { color:#8b949e; font-size:0.65rem; }
.dim-value { color:#c9d1d9; margin:0 0 4px 8px; }
.dim-value.learned { color:#7ee787; }
.dim-value.improve { color:#f85149; }
.dim-value.principle { color:#d2a8ff; }
.dim-value.blindspot { color:#f0883e; }
.toggle-btn { color:#58a6ff; cursor:pointer; font-size:0.7rem; margin-left:8px; text-decoration:none; }
.toggle-btn:hover { text-decoration:underline; }
.rules-list { font-size:0.8rem; line-height:1.6; }
.rule-item { padding:3px 0; }
.rule-p0 { color:#f85149; }
.rule-p1 { color:#d2a8ff; }
.rule-p2 { color:#7ee787; }
.stats { display:flex; gap:16px; margin-bottom:12px; flex-wrap:wrap; }
.stat { background:#0d1117; border:1px solid #30363d; border-radius:6px; padding:8px 12px; text-align:center; min-width:80px; }
.stat-num { font-size:1.3rem; font-weight:600; }
.timestamp { font-size:0.7rem; color:#8b949e; margin-top:8px; }
.empty { color:#484f58; font-style:italic; }
.error { color:#f85149; }
</style>
</head>
<body>

<h1>🍄 常春藤 · 运行状态</h1>
<div class="stats" id="stats">
  <div class="stat"><div class="stat-num" id="ref-count" style="color:#58a6ff">-</div><div class="stat-label">自省次数</div></div>
  <div class="stat"><div class="stat-num" id="dist-count" style="color:#58a6ff">-</div><div class="stat-label">蒸馏次数</div></div>
  <div class="stat"><div class="stat-num" id="rule-count" style="color:#58a6ff">-</div><div class="stat-label">经验准则</div></div>
</div>
<p class="timestamp" id="last-update">等待数据...</p>

<div class="grid">
  <div class="card">
    <h2>📝 自省日志</h2>
    <div class="log" id="reflection-log"><p class="empty">加载中...</p></div>
  </div>
  <div class="card">
    <h2>⚗️ 经验蒸馏</h2>
    <div class="log" id="experience-log"><p class="empty">加载中...</p></div>
  </div>
  <div class="card" style="grid-column:1/-1;">
    <h2>📋 当前经验准则</h2>
    <div class="rules-list" id="rules-list"><p class="empty">暂无经验准则</p></div>
  </div>
</div>

<script>
function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function qualityClass(score) {
  if (score >= 7) return 'quality-hi';
  if (score >= 4) return 'quality-md';
  return 'quality-lo';
}

function dimLabel(key) {
  return { 'learned':'📖 学到了', 'improve':'🔧 改进', 'principle':'📐 原则', 'blindspot':'⚠️ 盲区' }[key] || key;
}

function reflectionItem(r) {
  const ts = r.time || '';
  const q = r.quality || '?';
  const qc = qualityClass(q);
  const summary = r.summary ? r.summary.replace(/【.+?】/,'').trim() : '';
  const id = 'dim-' + Math.random().toString(36).slice(2,7);

  let dimsHtml = '';
  const dims = r.dims || {};
  for (const [key, val] of Object.entries(dims)) {
    dimsHtml += `<div class="dim-label">${dimLabel(key)}</div><div class="dim-value ${key}">${escapeHtml(val)}</div>`;
  }

  return `<div class="log-item">
    <span class="log-time">${escapeHtml(ts)}</span>
    <span class="log-quality ${qc}">${q}/10</span>
    <span class="log-content">${escapeHtml(summary.slice(0,80))}</span>
    ${dimsHtml ? `<a class="toggle-btn" onclick="toggleDims('${id}')">▸ 展开</a>` : ''}
    <div class="dims" id="${id}">${dimsHtml}</div>
  </div>`;
}

function toggleDims(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('show');
  const btn = el.previousElementSibling;
  if (el.classList.contains('show')) btn.textContent = '▾ 收起';
  else btn.textContent = '▸ 展开';
}

function experienceItem(log) {
  if (typeof log === 'string') return `<div class="log-item"><span class="log-content">${escapeHtml(log)}</span></div>`;
  return `<div class="log-item"><span class="log-content">${escapeHtml(JSON.stringify(log))}</span></div>`;
}

function priorityClass(rule) {
  if (rule.includes('[P0]')) return 'rule-p0';
  if (rule.includes('[P2]')) return 'rule-p2';
  return 'rule-p1';
}

async function fetchStatus() {
  try {
    const token = localStorage.getItem('hedera_token') || '';
    const headers = { 'Authorization': `Bearer ${token}` };
    const res = await fetch('/api/status', { headers });
    if (res.status === 401) {
      document.getElementById('reflection-log').innerHTML = '<p class="error">需要登录</p>';
      tryLogin();
      return;
    }
    const data = await res.json();

    document.getElementById('ref-count').textContent = data.reflections?.length || 0;
    document.getElementById('dist-count').textContent = data.experiences?.length || 0;
    document.getElementById('rule-count').textContent = data.rules_count || 0;

    // 自省日志（详细版）
    const rlog = document.getElementById('reflection-log');
    if (data.reflection_details?.length) {
      rlog.innerHTML = data.reflection_details.slice().reverse().map(reflectionItem).join('');
    } else if (data.reflections?.length) {
      // fallback to simple version
      rlog.innerHTML = data.reflections.slice().reverse().map(log => {
        const ts = log.includes('【') ? log.match(/【(.+?)】/)?.[1] : '';
        const content = ts ? log.replace(/【.+?】/, '').trim() : log;
        return `<div class="log-item"><span class="log-time">${escapeHtml(ts||'')}</span><span class="log-content">${escapeHtml(content)}</span></div>`;
      }).join('');
    } else {
      rlog.innerHTML = '<p class="empty">暂无自省记录</p>';
    }

    // 蒸馏日志
    const elog = document.getElementById('experience-log');
    if (data.experiences?.length) {
      elog.innerHTML = data.experiences.slice().reverse().map(experienceItem).join('');
    } else {
      elog.innerHTML = '<p class="empty">暂无蒸馏记录</p>';
    }

    // 经验准则
    const rlist = document.getElementById('rules-list');
    if (data.rules?.length) {
      rlist.innerHTML = data.rules.map(r =>
        `<div class="rule-item ${priorityClass(r)}">- ${escapeHtml(r)}</div>`
      ).join('');
    } else {
      rlist.innerHTML = '<p class="empty">暂无经验准则</p>';
    }

    document.getElementById('last-update').textContent = `更新于 ${new Date().toLocaleString('zh-CN')} · 每5秒刷新`;
  } catch(e) {
    document.getElementById('reflection-log').innerHTML = `<p class="error">连接失败: ${escapeHtml(e.message)}</p>`;
  }
}

function tryLogin() {
  const pwd = prompt('输入常春藤密码:');
  if (pwd) {
    fetch('/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pwd})
    }).then(r => r.json()).then(d => {
      if (d.token) {
        localStorage.setItem('hedera_token', d.token);
        fetchStatus();
      }
    }).catch(() => {});
  }
}

const saved = localStorage.getItem('hedera_token');
if (saved) fetchStatus();
else tryLogin();

setInterval(fetchStatus, 5000);
</script>
</body>
</html>
