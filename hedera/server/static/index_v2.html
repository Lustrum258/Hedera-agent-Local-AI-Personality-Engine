// ─── 文件上传（多文件 + 附加消息）───
var _pendingFiles=[];  // {file: File, name: string, size: string}

if($('attachBtn'))$('attachBtn').onclick=function(){
  var fi=document.getElementById('fileInput');
  if(!fi){
    fi=document.createElement('input');
    fi.type='file';fi.id='fileInput';fi.style='display:none';fi.multiple=true;
    document.body.appendChild(fi);
    fi.onchange=function(){
      var files=Array.from(this.files);
      if(!files.length)return;
      for(var i=0;i<files.length;i++){
        var f=files[i];
        // 检查是否已添加同名文件
        var exists=false;
        for(var j=0;j<_pendingFiles.length;j++){if(_pendingFiles[j].name===f.name&&_pendingFiles[j].size===f.size){exists=true;break}}
        if(exists)continue;
        var sizeStr=f.size<1024?f.size+'B':f.size<1048576?(f.size/1024).toFixed(1)+'KB':(f.size/1048576).toFixed(1)+'MB';
        _pendingFiles.push({file:f,name:f.name,size:sizeStr});
      }
      _renderFilePreview();
      this.value='';
    };
  }
  fi.click();
};

function _renderFilePreview(){
  var container=$('filePreview');
  if(!container)return;
  if(!_pendingFiles.length){container.classList.remove('show');container.innerHTML='';return}
  container.classList.add('show');
  var html='';
  for(var i=0;i<_pendingFiles.length;i++){
    html+='<div class="file-chip" data-idx="'+i+'">'+
      '<span class="fname">'+escapeHtml(_pendingFiles[i].name)+'</span>'+
      '<span class="fsize">'+_pendingFiles[i].size+'</span>'+
      '<button type="button" class="fremove" onclick="_removeFile('+i+')">&times;</button></div>';
  }
  container.innerHTML=html;
}

function _removeFile(idx){
  _pendingFiles.splice(idx,1);
  _renderFilePreview();
}

function _uploadFilesAndSend(text){
  if(!_pendingFiles.length){
    // 没有文件，直接发消息
    _doSend(text);
    return;
  }
  // 有文件：先上传所有文件，再发消息
  showTyping();LOADING=true;sendBtn.disabled=true;
  var uploadedFiles=[];
  var remaining=_pendingFiles.length;

  for(var i=0;i<_pendingFiles.length;i++){
    (function(idx){
      var pf=_pendingFiles[idx];
      var fd=new FormData();
      fd.append('file',pf.file);
      fd.append('session_id',SESSION_ID||'');
      var x=new XMLHttpRequest();
      x.open('POST',HOST+'/upload');
      x.setRequestHeader('Authorization','Bearer '+TOKEN);
      x.onload=function(){
        try{
          var d=JSON.parse(x.responseText);
          if(d.status==='ok'&&d.file)uploadedFiles.push(d.file);
        }catch(e){}
        remaining--;
        if(remaining<=0)_onAllUploaded(text,uploadedFiles);
      };
      x.onerror=function(){
        remaining--;
        if(remaining<=0)_onAllUploaded(text,uploadedFiles);
      };
      x.send(fd);
    })(i);
  }
}

function _onAllUploaded(text,uploadedFiles){
  _pendingFiles=[];
  _renderFilePreview();
  // 构建发送给后端的消息（包含文件引用）
  var msgParts=[];
  if(text)msgParts.push(text);
  for(var i=0;i<uploadedFiles.length;i++){
    msgParts.push('[文件: '+uploadedFiles[i].name+']('+uploadedFiles[i].url+')');
  }
  var fullMsg=msgParts.join('\n')||'(已上传文件)';
  // 用 _doSend 统一处理，传入文件列表用于显示下载按钮
  _doSend(fullMsg,uploadedFiles);
}

function updateSessList(){

function loadSessions(){
  $('sessList').innerHTML='<div class="empty-hint">'+_t('loading')+'</div>';
  var x=new XMLHttpRequest();
  x.open('GET',HOST+'/sessions');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    if(x.status===401){TOKEN='';LS.removeItem('hedera_token');showLogin();return}
    if(x.status!==200){$('sessList').innerHTML='<div class="empty-hint">'+_t('loadFailed')+'</div>';return}
    var d=JSON.parse(x.responseText);
    var sessions=(d.sessions||[]).filter(function(s){return s.session_id&&(s.message_count>0||s.session_id===SESSION_ID)});
    var html='';
    if(!sessions.length)html='<div class="empty-hint">'+_t('noSessions')+'</div>';
    else for(var i=0;i<sessions.length;i++){
      var s=sessions[i];
      var active=s.session_id===SESSION_ID;
      var pf=s.profile||'';
      var pname='冬青';
      if(pf.indexOf('茯苓')>=0)pname='茯苓';
      else if(pf.indexOf('冬青')>=0)pname='冬青';
      var label=s.title||pname||s.session_id.slice(0,24);
      var msgs=s.message_count||0;
      var last=(s.last_active||'').replace(/^\d{4}-/,'');
      var slabel=s.title||'';
      html+='<div class="session-item'+(active?' active':'')+'" data-sid="'+s.session_id+'" data-title="'+escapeHtml(slabel)+'" data-profile="'+escapeHtml(pname)+'">';
      html+='<div class="sline"><span class="sname">'+escapeHtml(label)+'</span><span class="sbadge'+(active?' show':'')+'">'+_t('curSess')+'</span><button type="button" class="sdel" data-del="'+s.session_id+'">&times;</button></div>';
      html+='<div class="smeta">'+msgs+' '+_t('msgCount').replace('{n}','')+' <span style="color:var(--accent);font-size:10px">'+escapeHtml(pname)+'</span></div></div>';
    }
    $('sessList').innerHTML=html;
    // 绑定事件
    $('sessList').querySelectorAll('.session-item').forEach(function(el){
      el.addEventListener('click',function(e){
        if(e.target.closest('.sdel'))return;
        var sid=this.getAttribute('data-sid');
        if(sid===SESSION_ID){toggleSidebar(false);return}
        // 切换会话时清理旧会话的工具状态
        removeToolIndicator();
        _toolCalls=[];
        var oldTI=document.getElementById('toolIndicator');if(oldTI)oldTI.remove();
        _toolCallSession='';
        LOADING=false;sendBtn.disabled=false;
        SESSION_ID=sid;
        // 从 data-title 恢复会话标题
        var sel=$('sessList').querySelector('[data-sid="'+sid+'"]');
        var stitle=sel?sel.getAttribute('data-title')||'':'';
        SESSION_LABEL=stitle;
        if(stitle){LS.setItem('hedera_session_label',stitle)}else{LS.removeItem('hedera_session_label')}
        LS.setItem('hedera_session_id',sid);
        updateSessionLabel();loadSessionMessages(sid);
        updateSessList();toggleSidebar(false);
        // 会话已选中，启用输入
        input.disabled=false;sendBtn.disabled=false;
        if($('attachBtn'))$('attachBtn').disabled=false;
        input.focus();
        // 从会话列表中找到该会话的人格名
        var sels=$('sessList').querySelector('[data-sid="'+sid+'"]');
        if(sels){var pf=sels.getAttribute('data-profile');if(pf)CURRENT_PROFILE_NAME=pf;updateEmptyText()}
      });
    });
    $('sessList').querySelectorAll('.sdel').forEach(function(btn){
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        var sid=this.getAttribute('data-del');
        if(!confirm(_t('deleteSess')))return;
        var chatReq=new XMLHttpRequest();
        chatReq.open('DELETE',HOST+'/sessions/'+encodeURIComponent(sid));
        chatReq.setRequestHeader('Authorization','Bearer '+TOKEN);
        chatReq.onload=function(){
          if(chatReq.status===200){
            if(SESSION_ID===sid){SESSION_ID='';SESSION_LABEL='';LS.removeItem('hedera_session_id');LS.removeItem('hedera_session_label');updateSessionLabel();loadSessionMessages('')}
            loadSessions();
            toggleSidebar(false);
          }
        };
        chatReq.send();
      });
    });
  };
  x.onerror=function(){$('sessList').innerHTML='<div class="empty-hint">'+_t('networkError')+'</div>'};
  x.send();
}

function loadReflection(){

function loadReflectionData(){
  $('reflectionContent').innerHTML='<div class="empty-hint">'+_t('loading')+'</div>';
  var x=new XMLHttpRequest();
  x.open('GET',HOST+'/api/status');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    if(x.status!==200){$('reflectionContent').innerHTML='<div class="empty-hint">'+_t('loadFailed')+'</div>';return}
    var d=JSON.parse(x.responseText);
    var html='';
    var tab=REFRESH_TAB;
    if(tab==='reflog'){
      var logs=d.reflections||[];
      if(!logs.length)html='<div class="empty-hint">'+_t('noReflog')+'</div>';
      else for(var i=logs.length-1;i>=0;i--){
        var l=logs[i];
        var time=l.split('\u3010')[1]?l.split('\u3010')[1].split('\u3011')[0]||'':'';
        var content=l.replace('\u3010'+time+'\u3011','');
        html+='<div class="ref-item"><div class="rtime">'+escapeHtml(time)+'</div><div class="rcontent">'+escapeHtml(content.slice(0,200))+'</div></div>';
      }
    }else if(tab==='experience'){
      var exps=d.experiences||[];
      if(!exps.length)html='<div class="empty-hint">'+_t('noExp')+'</div>';
      else for(var i=exps.length-1;i>=0;i--){
        var e=exps[i];
        var rules=(e.rules||[]).join('; ');
        html+='<div class="ref-item"><div class="rtime">'+escapeHtml(e.time||'')+'</div><div class="rcontent">'+escapeHtml(rules.slice(0,200))+'</div></div>';
      }
    }else if(tab==='rules'){
      var rules=d.rules||[];
      if(!rules.length)html='<div class="empty-hint">'+_t('noRules')+'</div>';
      else for(var i=0;i<rules.length;i++){
        html+='<div class="ref-item"><div class="rcontent">'+(i+1)+'. '+escapeHtml(rules[i])+'</div></div>';
      }
    }
    html+='<div class="ref-refresh" id="refRefreshBtn">'+_t('refresh')+'</div>';
    $('reflectionContent').innerHTML=html;
    var btn=$('refRefreshBtn');
    if(btn)btn.onclick=function(){loadReflectionData()};
  };
  x.onerror=function(){$('reflectionContent').innerHTML='<div class="empty-hint">'+_t('networkError')+'</div>'};
  x.send();
}

// 自动保存：输入框变化 → 防抖 300ms → 保存 + 重载 + 闪 ✓
var _autoSaveTimer=null;
function _scheduleAutoSave(){
  if(_autoSaveTimer)clearTimeout(_autoSaveTimer);
  _autoSaveTimer=setTimeout(function(){_autoSaveTimer=null;_doAutoSave()},300);
}
function _cancelAutoSave(){if(_autoSaveTimer){clearTimeout(_autoSaveTimer);_autoSaveTimer=null}}
// 立即保存（用于 blur/key 等需要马上写入的场景）
function _immediateSave(){
  if(_autoSaveTimer){clearTimeout(_autoSaveTimer);_autoSaveTimer=null}
  _doAutoSave();
}

// 收集当前 Tab 有变化的字段
function _collectConfigBody(){
  var body={};
  var mk=$('cfgModelKey').value.trim();if(mk)body.model_api_key=mk;
  var mn=$('cfgModelName').value.trim();if(mn)body.model_name=mn;
  var me=$('cfgModelEndpoint').value.trim();if(me)body.model_endpoint=me;
  var tk=$('cfgTavilyKey').value.trim();if(tk)body.search_keys={tavily:tk};
  var im=$('cfgImgModel').value.trim();if(im)body.image_gen_model=im;
  var ie=$('cfgImgEndpoint').value.trim();if(ie)body.image_gen_endpoint=ie;
  var ik=$('cfgImgKey').value.trim();if(ik)body.image_gen_key=ik;
  var tm=$('cfgTtsModel').value.trim();if(tm)body.tts_model=tm;
  var tv=$('cfgTtsVoice').value.trim();if(tv)body.tts_voice=tv;
  var te=$('cfgTtsEndpoint').value.trim();if(te)body.tts_endpoint=te;
  var tsk=$('cfgTtsKey').value.trim();if(tsk)body.tts_key=tsk;
  return body;
}

function _doAutoSave(){
  var body=_collectConfigBody();
  if(!Object.keys(body).length)return;
  var x=new XMLHttpRequest();
  x.open('POST',HOST+'/config');
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    if(x.status===200){
      // 重载
      var r=new XMLHttpRequest();r.open('POST',HOST+'/config/reload');r.setRequestHeader('Authorization','Bearer '+TOKEN);r.send();
      // 闪 ✓ 指示器
      _flashSaveIndicators();
      setStatus(_t('presetApplied'),'ok');
      setTimeout(function(){setStatus('')},3000);
    }
  };
  x.send(JSON.stringify(body));
}

function _flashSaveIndicators(){
  var ids=['siModelKey','siImgKey','siTtsKey','siTavilyKey'];
  for(var i=0;i<ids.length;i++){var el=$(ids[i]);if(el){el.classList.add('show');(function(e){setTimeout(function(){e.classList.remove('show')},2000)})(el)}}
}

// 绑定所有输入框的自动保存
// _userTouched 防止浏览器自动填充触发保存
var _userTouched={};
(function(){
  var inputs=['cfgModelKey','cfgModelName','cfgModelEndpoint','cfgTavilyKey','cfgImgModel','cfgImgEndpoint','cfgImgKey','cfgTtsModel','cfgTtsVoice','cfgTtsEndpoint','cfgTtsKey'];
  for(var i=0;i<inputs.length;i++){
    (function(el){
      if(!el)return;
      // 只在用户真正输入时标记
      el.addEventListener('keydown',function(){_userTouched[el.id]=true});
      el.addEventListener('paste',function(){_userTouched[el.id]=true;setTimeout(_immediateSave,50)});
      el.addEventListener('input',function(){
        if(!_userTouched[el.id])return; // 自动填充的不触发
        _scheduleAutoSave();
      });
      el.addEventListener('blur',function(){
        if(_userTouched[el.id])_immediateSave();
      });
      el.addEventListener('change',function(){
        if(_userTouched[el.id])_immediateSave();
      });
    })($(inputs[i]));
  }
})();
// F5/刷新前如果有待保存内容，阻止刷新 → 保存 → 刷新
window.addEventListener('keydown',function(e){
  if((e.key==='F5'||(e.ctrlKey&&e.key==='r'))&&_autoSaveTimer){
    e.preventDefault();
    clearTimeout(_autoSaveTimer);_autoSaveTimer=null;
    var body=_collectConfigBody();
    if(Object.keys(body).length){
      var x=new XMLHttpRequest();
      x.open('POST',HOST+'/config',false); // 同步请求
      x.setRequestHeader('Content-Type','application/json');
      x.setRequestHeader('Authorization','Bearer '+TOKEN);
      try{x.send(JSON.stringify(body))}catch(e2){}
      // 重载
      var r=new XMLHttpRequest();r.open('POST',HOST+'/config/reload',false);r.setRequestHeader('Authorization','Bearer '+TOKEN);try{r.send()}catch(e2){}
    }
    location.reload();
  }
});

// ─── 预设管理（下拉选择器 UI）───
var PRESET_CATS={llm:{fields:['cfgModelName','cfgModelEndpoint','cfgModelKey'],nameKey:'cfgModelName'},
  img:{fields:['cfgImgModel','cfgImgEndpoint','cfgImgKey'],nameKey:'cfgImgModel'},
  tts:{fields:['cfgTtsModel','cfgTtsVoice','cfgTtsEndpoint','cfgTtsKey'],nameKey:'cfgTtsModel'}};
var _presetCache={llm:[],img:[],tts:[]};

function refreshPresetList(cat){
  var sel=$('presetSelect'+cat.charAt(0).toUpperCase()+cat.slice(1));
  if(!sel)return;
  var x=new XMLHttpRequest();
  x.open('GET',HOST+'/api/presets');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    try{
      var d=JSON.parse(x.responseText);
      var presets=(d.presets&&d.presets[cat])||[];
      _presetCache[cat]=presets;
      _renderPresetSelect(cat,sel,presets);
    }catch(e){}
  };
  x.send();
}

function _getActivePresetIdx(cat,presets){
  if(!_currentConfig||!presets.length)return-1;
  var nameField=PRESET_CATS[cat].nameKey;
  var curVal='';
  if(cat==='llm')curVal=(_currentConfig.model||{}).name||'';
  else if(cat==='img')curVal=(_currentConfig.image_gen||{}).model||'';
  else if(cat==='tts')curVal=(_currentConfig.tts||{}).model||'';
  for(var i=0;i<presets.length;i++){
    if(presets[i][nameField]&&presets[i][nameField]===curVal)return i;
  }
  return-1;
}

function _renderPresetSelect(cat,sel,presets){
  var activeIdx=_getActivePresetIdx(cat,presets);
  var activeTag=$('presetActive'+cat.charAt(0).toUpperCase()+cat.slice(1));
  sel.innerHTML='<option value="" data-i18n="selectPreset">'+_t('selectPreset')+'</option>';
  for(var i=0;i<presets.length;i++){
    var opt=document.createElement('option');
    opt.value=i;
    opt.textContent=presets[i].name;
    if(i===activeIdx)opt.textContent+=' *';
    sel.appendChild(opt);
  }
  if(activeIdx>=0)sel.value=String(activeIdx);
  if(activeTag)activeTag.style.display=activeIdx>=0?'inline':'none';
  if(!sel.dataset.customized){
    initCustomSelect(sel.id);
  }else if(sel._customRefresh){
    sel._customRefresh();
  }
  _updatePresetBtns(cat);
}

function _updatePresetBtns(cat){
  var sel=$('presetSelect'+cat.charAt(0).toUpperCase()+cat.slice(1));
  if(!sel)return;
  var hasSelection=sel.value!=='';
  var row=sel.closest('.custom-select')?sel.closest('.custom-select').closest('.preset-row'):sel.closest('.preset-row');
  if(!row)return;
  var btns=row.querySelectorAll('.pa-btn');
  for(var i=0;i<btns.length;i++)btns[i].disabled=!hasSelection;
}

document.addEventListener('change',function(e){
  if(e.target.classList.contains('preset-select')){
    var cat=e.target.id.replace('presetSelect','').toLowerCase();
    _updatePresetBtns(cat);
  }
});

window.savePreset=savePreset;
function savePreset(cat){
  var nameInput=cat==='llm'?'cfgPresetName':cat==='img'?'cfgPresetNameImg':'cfgPresetNameTts';
  var name=$(nameInput).value.trim();
  if(!name){setStatus(_t('presetNamePlaceholder'),'err');return}
  var data={name:name,category:cat};
  var fields=PRESET_CATS[cat].fields;
  for(var i=0;i<fields.length;i++){var el=$(fields[i]);if(el&&el.value.trim())data[fields[i]]=el.value.trim()}
  var x=new XMLHttpRequest();
  x.open('POST',HOST+'/api/presets');
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    try{var d=JSON.parse(x.responseText);if(d.error){setStatus('保存失败: '+d.error,'err');return}}catch(e){}
    $(nameInput).value='';
    setStatus(_t('presetApplied').replace('{name}',name),'ok');
    setTimeout(function(){setStatus('')},3000);
    refreshPresetList(cat);
  };
  x.onerror=function(){setStatus('保存失败','err')};
  x.send(JSON.stringify(data));
}

window.applyPreset=applyPreset;
function applyPreset(cat){
  var sel=$('presetSelect'+cat.charAt(0).toUpperCase()+cat.slice(1));
  if(!sel||sel.value==='')return;
  var idx=parseInt(sel.value,10);
  var p=_presetCache[cat][idx];if(!p)return;
  // 填入字段
  var fields=PRESET_CATS[cat].fields;
  for(var i=0;i<fields.length;i++){var el=$(fields[i]);if(el&&p[fields[i]])el.value=p[fields[i]]}
  // 后端应用 + 重载
  setStatus(_t('applyingPreset').replace('{name}',p.name));
  var x=new XMLHttpRequest();
  x.open('POST',HOST+'/api/presets/apply');
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    var r=new XMLHttpRequest();
    r.open('POST',HOST+'/config/reload');
    r.setRequestHeader('Authorization','Bearer '+TOKEN);
    r.onload=function(){
      setStatus(p.name+' '+_t('presetApplied'),'ok');
      setTimeout(function(){setStatus('')},3000);
      loadConfig();
    };
    r.send();
  };
  x.onerror=function(){setStatus(_t('applyFailed'),'err')};
  x.send(JSON.stringify({name:p.name,category:cat}));
}

window.delPreset=delPreset;
function delPreset(cat){
  var sel=$('presetSelect'+cat.charAt(0).toUpperCase()+cat.slice(1));
  if(!sel||sel.value==='')return;
  var idx=parseInt(sel.value,10);
  var p=_presetCache[cat][idx];if(!p)return;
  if(!confirm(_t('confirmDeletePreset').replace('{name}',p.name)))return;
  var x=new XMLHttpRequest();
  x.open('DELETE',HOST+'/api/presets/'+encodeURIComponent(p.name));
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    setStatus(_t('presetDeleted').replace('{name}',p.name),'ok');
    setTimeout(function(){setStatus('')},3000);
    refreshPresetList(cat);

  x.send();
}

// ─── 自定义人格管理 ───
function loadCustomProfiles(){
  var container=$('customProfileList');
  if(!container)return;
  var x=new XMLHttpRequest();
  x.open('GET',HOST+'/api/profiles');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    try{
      var d=JSON.parse(x.responseText);
      var profiles=d.profiles||[];
      var custom=profiles.filter(function(p){
        return p.name!=='冬青'&&p.name!=='茯苓';
      });
      if(!custom.length){
        container.innerHTML='<div style="color:var(--dim);font-size:11px;padding:4px 0">'+_t('noCustomProfiles')+'</div>';
        container.onclick=null;
        return;
      }
      var html='';
      for(var i=0;i<custom.length;i++){
        var p=custom[i];
        html+='<div class="preset-row" data-pname="'+escapeHtml(p.name)+'">'+
          '<span style="flex:1;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escapeHtml(p.name)+'</span>'+
          '<span style="font-size:10px;color:var(--dim)">'+escapeHtml(p.tag||'')+'</span>'+
          '<button type="button" class="pa-btn del profile-del-btn">'+_t('deleteBtn')+'</button>'+
          '</div>';
      }
      container.innerHTML=html;
      // 事件委托：点删除按钮
      container.onclick=function(e){
        if(!e.target.classList.contains('profile-del-btn'))return;
        var card=e.target.closest('[data-pname]');
        if(!card)return;
        var pname=card.getAttribute('data-pname');
        if(!pname)return;
        if(!confirm(_t('confirmDeleteProfile').replace('{name}',pname)))return;
        var rx=new XMLHttpRequest();
        rx.open('DELETE',HOST+'/api/profiles/'+encodeURIComponent(pname));
        rx.setRequestHeader('Authorization','Bearer '+TOKEN);
        rx.onload=function(){
          try{
            var rd=JSON.parse(rx.responseText);
            if(rd.status==='ok'){loadCustomProfiles();loadNewSessProfiles()}
          }catch(e){}
        };
        rx.send();
      };
    }catch(e){}
  };
  x.send();
}

      }catch(e){
        $('cfgProfileStatus').textContent='创建失败';
        $('cfgProfileStatus').className='sstatus err';
      }
    };
    x.onerror=function(){
      $('cfgProfileStatus').textContent='网络错误';
      $('cfgProfileStatus').className='sstatus err';
    };
    x.send(JSON.stringify(body));
  };
}

// ─── 上下文用量显示 ───
function refreshContext(){
  if(!TOKEN)return;
  var sid=SESSION_ID||'_default';
  var cx=new XMLHttpRequest();
  cx.open('GET',HOST+'/api/context?session_id='+encodeURIComponent(sid));
  cx.setRequestHeader('Authorization','Bearer '+TOKEN);
  cx.onload=function(){
    if(cx.status!==200)return;
    try{
      var d=JSON.parse(cx.responseText);
      var bar=$('ctxBar');
      if(!bar)return;
      var pct=d.usage_pct||0;
      var color=pct<50?'green':pct<80?'yellow':'red';
      var promptT=d.prompt_tokens||0;
      var compT=d.completion_tokens||0;
      var totalT=d.estimated_tokens||0;
      var max=d.max_context_tokens||0;
      var msgs=d.message_count||0;
      if(promptT>0){
        bar.innerHTML=
          '<span class="ctx-item"><span class="ctx-dot '+color+'"></span> '+_t('ctxLabel')+': '+promptT.toLocaleString()+' '+_t('ctxIn')+' / '+compT.toLocaleString()+' '+_t('ctxOut')+' / '+max.toLocaleString()+' '+_t('ctxMax')+' ('+pct+'%)</span>'+
          '<span class="ctx-item">'+_t('ctxMessages')+': '+msgs+'</span>';
      }else{
        bar.innerHTML=
          '<span class="ctx-item"><span class="ctx-dot '+color+'"></span> '+_t('ctxLabel')+': ~'+totalT.toLocaleString()+'/'+max.toLocaleString()+' tokens ('+pct+'%)</span>'+
          '<span class="ctx-item">'+_t('ctxMessages')+': '+msgs+'</span>';
      }
      bar.style.display='flex';
    }catch(e){}
  };
  cx.send();
}
// 每次发送消息后刷新

if(typeof loadSessions==='function'){
  loadSessions=function(){_origLoadSessions();refreshContext();};
}
// 登录后首次加载
if(TOKEN)refreshContext();

// ─── 自定义下拉组件 ───
function initCustomSelect(selId){
  var sel=$(selId);
  if(!sel||sel.dataset.customized)return;
  sel.dataset.customized='1';
  var wrapper=document.createElement('div');
  wrapper.className='custom-select';
  sel.parentNode.insertBefore(wrapper,sel);
  wrapper.appendChild(sel);
  sel.style.display='none';
  var trigger=document.createElement('div');
  trigger.className='cs-trigger';
  trigger.textContent=sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].text:'';
  wrapper.appendChild(trigger);
  var menu=document.createElement('div');
  menu.className='cs-menu';
  wrapper.appendChild(menu);
  function renderOptions(){
    menu.innerHTML='';
    for(var i=0;i<sel.options.length;i++){
      var opt=sel.options[i];
      var item=document.createElement('div');
      item.className='cs-option'+(opt.value===sel.value?' active':'');
      item.textContent=opt.text;
      item.dataset.value=opt.value;
      item.onclick=function(){
        sel.value=this.dataset.value;
        trigger.textContent=this.textContent;
        menu.querySelectorAll('.cs-option').forEach(function(o){o.classList.remove('active')});
        this.classList.add('active');
        wrapper.classList.remove('open');
        sel.dispatchEvent(new Event('change'));
      };
      menu.appendChild(item);
    }
  }
  renderOptions();
  trigger.onclick=function(e){
    e.stopPropagation();
    var isOpen=wrapper.classList.contains('open');
    document.querySelectorAll('.custom-select.open').forEach(function(s){s.classList.remove('open')});
    if(!isOpen){
      wrapper.classList.add('open');
      renderOptions();
    }
  };
  document.addEventListener('click',function(){wrapper.classList.remove('open')});
  menu.onclick=function(e){e.stopPropagation()};
  sel._customRefresh=function(){
    trigger.textContent=sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].text:'';
    renderOptions();
  };
}
