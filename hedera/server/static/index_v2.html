<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>常春藤 · 冬青</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" href="/icon.png" type="image/png" sizes="256x256">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0b10;--surface:#16161f;--border:#232336;--text:#dedee8;--dim:#787890;--dim-bg:#1a1a28;--accent:#6c8c6c;--accent2:#4a6a4a;--accent3:#2a3a2a;--msg-bot:#16161f;--msg-user:#1a2626;--radius:12px;--sbw:280px;--font:-apple-system,'PingFang SC','Noto Sans SC',system-ui,sans-serif;--mono:'Cascadia Code','JetBrains Mono','Fira Code','Consolas','DejaVu Sans Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100dvh;display:flex;overflow:hidden}

/* ── 关键帧 ── */
@keyframes fadeSlideIn{0%{opacity:0;transform:translateY(10px) scale(.97)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
@keyframes dotPulse{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes breathe{0%,100%{box-shadow:0 0 4px #6c8}50%{box-shadow:0 0 12px #6c8,0 0 24px #6c84}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideIn{0%{transform:translateX(-100%)}100%{transform:translateX(0)}}
@keyframes slideOut{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}

/* ── 侧边栏 ── */
#sidebar{width:var(--sbw);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:20;transition:width .3s cubic-bezier(.4,0,.2,1),border-color .3s ease}
#sidebar.collapsed{width:0;min-width:0;border-right-color:transparent}
#sidebar .logo{padding:14px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
#sidebar .logo svg{flex-shrink:0}
#sidebar .logo h1{font-size:15px;font-weight:500}
#sidebar .logo .close-sb{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:0;margin-left:auto;transition:color .2s}
#sidebar .logo .close-sb:hover{color:var(--text)}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 8px}
.sb-scroll::-webkit-scrollbar{width:4px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 侧边栏分区 */
.sb-section{border-bottom:1px solid var(--border)}
.sb-section .sb-head{padding:10px 16px;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;transition:color .2s}
.sb-section .sb-head:hover{color:var(--text)}
.sb-section .sb-head .arrow{font-size:9px;transition:transform .2s}
.sb-section .sb-head .arrow.open{transform:rotate(90deg)}
.sb-section .sb-body{padding:0 12px;max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1),padding .3s ease;opacity:0;transition:max-height .3s cubic-bezier(.4,0,.2,1),padding .3s ease,opacity .25s ease}
.sb-section .sb-body.open{max-height:9999px;padding:0 12px 12px;opacity:1}

/* 会话列表 */
.session-item{padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.session-item:hover{border-color:var(--accent);background:var(--accent3)40}
.session-item .sline{display:flex;align-items:center;gap:6px}
.session-item .sline .sname{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item .sline .sbadge{font-size:9px;background:var(--accent);color:#fff;border-radius:3px;padding:1px 5px;display:none}
.session-item .sline .sbadge.show{display:inline}
.session-item .sline .sdel{background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;padding:0 2px;opacity:0;transition:all .2s;line-height:1}
.session-item:hover .sline .sdel{opacity:1}
.session-item .sline .sdel:hover{color:#c66}
.session-item .smeta{font-size:10px;color:var(--dim);margin-top:2px}
.session-item.active{border-color:var(--accent);background:var(--accent3)80}
.session-new{display:flex;gap:6px;margin-bottom:10px}
.session-new input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;outline:none;font-family:var(--font);transition:border-color .2s}
.session-new input:focus{border-color:var(--accent)}
.session-new button{background:var(--accent);border:none;border-radius:6px;padding:6px 12px;color:#fff;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.session-new button:hover{background:#7da07d}
.empty-hint{color:var(--dim);font-size:12px;text-align:center;padding:12px}
  /* 自省选项卡 */
  #reflectionTab .rtab{padding:8px 12px;font-size:11px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none}
  #reflectionTab .rtab:hover{color:var(--text)}
  #reflectionTab .rtab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .ref-item{padding:6px 8px;border:1px solid var(--border);border-radius:6px;margin-bottom:4px;word-break:break-all}
  .ref-item .rtime{font-size:10px;color:var(--dim)}
  .ref-item .rcontent{font-size:11px;margin-top:2px}
  .ref-item .rqual{display:inline-block;font-size:9px;background:var(--accent3);color:var(--dim);border-radius:3px;padding:0 4px;margin-left:4px}
  .ref-refresh{font-size:10px;color:var(--dim);cursor:pointer;padding:4px 0;text-align:center;transition:color .2s}
  .ref-refresh:hover{color:var(--accent)}
  /* 人格切换 */
  .profile-item{padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s}
  .profile-item:hover{border-color:var(--accent);background:var(--accent3)40}
  .profile-item.active{border-color:var(--accent2);background:var(--accent3)80;cursor:default}
  .profile-item .pname{font-size:13px;font-weight:500}
  .profile-item .pname .pbadge{font-size:9px;background:var(--accent);color:#fff;border-radius:3px;padding:1px 5px;margin-left:6px;display:none}
  .profile-item .pname .pbadge.show{display:inline}
  .profile-item .ptag{font-size:11px;color:var(--dim);margin-top:2px}

/* 工具列表 */
.tool-item{padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.tool-item .tname{font-size:12px;font-weight:500}
.tool-item .tname .tag{font-size:10px;color:#6c8;margin-left:6px}
.tool-item .tdesc{font-size:11px;color:var(--dim);margin-top:2px}

/* 设置 */
.setting-row{margin-bottom:12px}
.setting-row label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px}
.setting-row.sb-subsection{margin-top:16px;margin-bottom:4px;border-top:1px solid var(--border);padding-top:10px}
.setting-row .sb-subtitle{font-size:12px;font-weight:600;color:var(--text)}
.setting-row input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;font-family:var(--font);transition:border-color .2s}
.setting-row input:focus{border-color:var(--accent)}
.setting-row .sbtn{background:var(--accent);border:none;border-radius:6px;padding:7px 16px;color:#fff;font-size:12px;cursor:pointer;transition:all .2s;margin-top:6px}
.setting-row .sbtn:hover{background:#7da07d}
.setting-row .sbtn.sec{background:var(--accent2);margin-left:6px}
.setting-row .sbtn:disabled{opacity:.4;cursor:default}
.setting-row .sstatus{font-size:11px;margin-top:4px}
.setting-row .sstatus.ok{color:#6c8}
.setting-row .sstatus.err{color:#c66}

/* 侧边栏底部 */
#sidebar .sb-foot{padding:8px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:12px}
#sidebar .sb-foot .sf-dot{width:6px;height:6px;border-radius:50%;transition:all .3s;flex-shrink:0}
#sidebar .sb-foot .sf-dot.on{background:#6c8;box-shadow:0 0 6px #6c8;animation:breathe 2s ease-in-out infinite}
#sidebar .sb-foot .sf-dot.off{background:#666}
#sidebar .sb-foot .sf-label{color:var(--dim);flex-shrink:0}
#sidebar .sb-foot .sf-ver{color:var(--dim);margin-left:auto;font-size:10px}
#sidebar .sb-foot .sf-logout{background:none;border:1px solid var(--border);border-radius:4px;color:var(--dim);font-size:10px;cursor:pointer;padding:2px 6px;transition:all .2s;flex-shrink:0}
#sidebar .sb-foot .sf-logout:hover{border-color:#c66;color:#c66}
#sidebar .sb-foot .sf-clear{font-size:10px;color:var(--dim);cursor:pointer;padding:2px 4px;transition:all .2s;margin-left:auto}
#sidebar .sb-foot .sf-clear:hover{color:#c66}

/* ── 主区域 ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
/* 顶栏 */
#topbar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;position:relative}
#topbar .menu-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);cursor:pointer;font-size:16px;padding:2px 7px;line-height:1.4;transition:all .2s;z-index:1}
#topbar .menu-btn:hover{border-color:var(--accent);color:var(--text)}
#topbar #curSession{position:absolute;left:50%;transform:translateX(-50%);font-size:13px;color:var(--text);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;border-bottom:1px dashed var(--border);padding:0 4px 2px}
  
#topbar .spacer{flex:1;visibility:hidden}
.profile-select{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:3px 6px;cursor:pointer;outline:none;font-family:var(--font);transition:border-color .2s}
.profile-select:focus{border-color:var(--accent)}
.profile-select option{background:var(--surface);color:var(--text)}

/* 聊天 */
#chat{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
#chat:empty::after{content:var(--empty-text,'冬青在等你。');display:block;text-align:center;color:var(--dim);padding:60px 16px;font-size:15px;animation:fadeSlideIn .6s ease-out}
.msg{max-width:82%;padding:10px 14px;border-radius:var(--radius);line-height:1.65;font-size:14px;word-break:break-word;animation:fadeSlideIn .3s ease-out}
.msg.me{background:var(--msg-user);border:1px solid var(--accent2);align-self:flex-end}
.msg.bot{background:var(--msg-bot);border:1px solid var(--border);align-self:flex-start}
.msg.bot.typing{padding:12px 18px;min-width:60px;display:flex;align-items:center;justify-content:center;gap:5px}
.typing-dot{width:8px;height:8px;border-radius:50%;background:var(--dim);display:inline-block;animation:dotPulse 1.4s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}

/* ── Markdown 渲染样式 ── */
.msg p{margin:4px 0;min-height:1.4em;white-space:pre-wrap}
.msg p:first-child{margin-top:0}
.msg p:last-child{margin-bottom:0}
.msg h1,.msg h2,.msg h3,.msg h4{margin:10px 0 4px;font-weight:600;line-height:1.4;color:var(--text)}
.msg h1{font-size:1.25em;border-bottom:1px solid var(--border);padding-bottom:4px}
.msg h2{font-size:1.15em;border-bottom:1px solid var(--border);padding-bottom:3px}
.msg h3{font-size:1.1em}
.msg h4{font-size:1.05em}
.msg strong{font-weight:600}
.msg em{font-style:italic}
.msg ul,.msg ol{padding-left:1.5em;margin:6px 0}
.msg li{margin:2px 0}
.msg li>p{margin:0}
.msg hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.msg blockquote{border-left:3px solid var(--accent);margin:8px 0;padding:4px 12px;color:var(--dim);background:var(--accent3)30;border-radius:0 6px 6px 0}
.msg blockquote p{margin:2px 0}
.msg code{font-family:var(--mono);background:var(--accent3);color:#d4d4e8;padding:1px 5px;border-radius:4px;font-size:.9em}
.msg pre{background:#0e0e17;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:8px 0;overflow-x:auto;position:relative}
.msg pre code{background:none;padding:0;font-size:.88em;line-height:1.55;tab-size:4;white-space:pre}
/* 代码块头部（语言标签 + 复制按钮） */
.msg .code-header{display:flex;align-items:center;justify-content:space-between;padding:4px 12px;background:var(--accent3);border-radius:8px 8px 0 0;border-bottom:1px solid var(--border);font-size:11px;color:var(--dim)}
.msg .code-header .code-lang{font-weight:500;text-transform:lowercase}
.msg .code-header .code-copy{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--dim);font-size:10px;cursor:pointer;padding:3px 10px;transition:all .2s;font-family:var(--font);white-space:nowrap}
.msg .code-header .code-copy:hover{color:var(--accent);border-color:var(--accent)}
.msg .code-header .code-copy.copied{color:#6c8;border-color:#6c8}
.msg .code-header+.msg pre,.msg .code-header+pre{margin-top:0;border-top-left-radius:0;border-top-right-radius:0;border-top:none}
.msg table{border-collapse:collapse;margin:8px 0;font-size:.92em;width:100%;display:block;overflow-x:auto}
.msg th,.msg td{border:1px solid var(--border);padding:5px 10px;text-align:left}
.msg th{background:var(--accent3)60;font-weight:600}
.msg tr:nth-child(even){background:var(--accent3)20}
.msg a{color:#7dab7d;text-decoration:none;border-bottom:1px solid var(--accent2)}
.tool-indicator{background:var(--dim-bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin:6px 0;font-size:12px;line-height:1.5;animation:fadeIn .2s ease}
.tool-indicator .ti-icon{display:inline-block;width:18px}
.tool-indicator .ti-name{font-weight:500}
.tool-indicator .ti-doing{color:var(--accent);margin-left:6px;font-size:11px}
.tool-indicator .ti-done{color:#6c8;margin-left:6px;font-size:11px}
.tool-indicator .ti-err{color:#c66;margin-left:6px;font-size:11px}

.switch{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border);transition:.3s;border-radius:20px}
.switch .slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;transition:.3s;border-radius:50%}
.switch input:checked+.slider{background:var(--accent)}
.switch input:checked+.slider:before{transform:translateX(16px)}
.msg a:hover{color:#9dcc9d}
.msg img{max-width:100%;border-radius:6px;margin:6px 0}

/* 输入 */
footer{padding:12px 16px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:var(--bg)}
footer textarea{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-family:var(--font);font-size:14px;resize:none;outline:none;min-height:40px;max-height:100px;transition:border-color .25s}
footer textarea:focus{border-color:var(--accent)}
footer button{background:var(--accent);border:none;border-radius:var(--radius);padding:10px 18px;color:#fff;font-size:14px;cursor:pointer;height:40px;transition:all .2s}
footer button:hover:not(:disabled){background:#7da07d;transform:translateY(-1px)}
footer button:active:not(:disabled){transform:translateY(0)}
footer button:disabled{opacity:.4;cursor:default}

footer #attachBtn{background:var(--accent);border:none;width:36px;padding:0}
footer #attachBtn:hover:not(:disabled){background:#7da07d;transform:translateY(-1px)}

/* 登录 */
#login{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px 36px;width:360px;max-width:90vw;text-align:center;animation:fadeSlideIn .5s ease-out}
.login-box .logo{font-size:42px;margin-bottom:8px;transition:transform .3s}
.login-box .logo:hover{transform:rotate(15deg) scale(1.1)}
.login-box h2{font-size:20px;font-weight:500}
.login-box .sub{font-size:12px;color:var(--dim);margin-bottom:24px}
.login-box input{display:block;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:14px;outline:none;font-family:var(--font);transition:border-color .25s}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;margin-top:10px;background:var(--accent);border:none;border-radius:10px;padding:12px;color:#fff;font-size:14px;cursor:pointer;transition:all .2s}
.login-box button:hover{background:#7da07d;transform:translateY(-1px)}
.login-box button:active{transform:translateY(0)}
.login-box .err{color:#c66;font-size:13px;margin-top:10px;display:none;animation:fadeSlideIn .25s}
.login-box .hint{font-size:12px;color:var(--dim);margin-top:12px}

/* 遮罩 */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:10;display:none;opacity:0;transition:opacity .3s}
#overlay.show{display:block;opacity:1}

@media(max-width:720px){
  #sidebar{position:fixed;top:0;left:0;bottom:0;z-index:30;box-shadow:4px 0 20px rgba(0,0,0,.5);width:var(--sbw);transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
  #sidebar:not(.collapsed){transform:translateX(0)}
}
</style>
<script async src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script async src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>
<body>

<!-- 登录 -->
<div id="login">
  <div class="login-box">
    <div class="logo"><svg viewBox="0 0 512 512" width="48" height="48"><path d="M256 90 L300 200 L256 180 L212 200 Z" fill="#0F5B3C"/><path d="M256 90 L300 200 L256 180 L212 200 Z" transform="rotate(120, 256, 256)" fill="#0F5B3C"/><path d="M256 90 L300 200 L256 180 L212 200 Z" transform="rotate(240, 256, 256)" fill="#0F5B3C"/><circle cx="256" cy="256" r="36" fill="#A41623"/></svg></div>
    <h2>常春藤</h2>
    <div class="sub">Hedera · 冬青</div>
    <input type="password" id="pwd" data-i18n="pwdPlaceholder" placeholder="密码" autocomplete="off">
    <button id="loginBtn" data-i18n="loginBtn">进入</button>
    <div class="err" id="loginErr"></div>
    <div class="hint" id="quoteLine"></div>
    <div style="margin-top:8px"><a href="/docs" target="_blank" data-i18n="docLink" style="font-size:11px;color:var(--accent);text-decoration:none">📜 文档</a></div>
  </div>
</div>

<!-- 侧边栏 -->
<div id="sidebar" class="collapsed">
  <div class="logo">
    <svg viewBox="0 0 512 512" width="20" height="20"><path d="M256 90 L300 200 L256 180 L212 200 Z" fill="#0F5B3C"/><path d="M256 90 L300 200 L256 180 L212 200 Z" transform="rotate(120, 256, 256)" fill="#0F5B3C"/><path d="M256 90 L300 200 L256 180 L212 200 Z" transform="rotate(240, 256, 256)" fill="#0F5B3C"/><circle cx="256" cy="256" r="36" fill="#A41623"/></svg>
    <h1>常春藤</h1>
    <button class="close-sb" id="closeSidebar">&times;</button>
  </div>
  <div class="sb-scroll">

    <!-- 会话 -->
    <div class="sb-section">
      <div class="sb-head" data-section="sessions"><span class="arrow open">&#9654;</span> <span data-i18n="sidebarSessions">会话</span></div>
      <div class="sb-body open" id="sbSessions">
        <div class="session-new">
          <input type="text" id="newSessTitle" data-i18n="newSessPlaceholder" placeholder="名称（可选）" style="flex:1;min-width:0">
          <select id="newSessProfile" class="profile-select" style="flex-shrink:0"></select>
          <button id="newSessBtn" data-i18n="newSessBtn">新建</button>
        </div>
        <div id="sessList">加载中...</div>
      </div>
    </div>

    <!-- 工具 -->
    <div class="sb-section">
      <div class="sb-head" data-section="tools"><span class="arrow">&#9654;</span> <span data-i18n="sidebarTools">工具</span></div>
      <div class="sb-body" id="sbTools"><div id="toolList" class="empty-hint">加载中...</div></div>
    </div>

    <!-- 自省 -->
    <div class="sb-section">
      <div class="sb-head" data-section="reflection"><span class="arrow">&#9654;</span> <span data-i18n="sidebarReflection">自省</span></div>
      <div class="sb-body" id="sbReflection" style="padding:0">
        <div id="reflectionTab" style="display:flex;border-bottom:1px solid var(--border)">
          <span class="rtab active" data-tab="reflog" data-i18n="tabReflog">反思</span>

// ─── Markdown 渲染 ───
function renderMarkdown(text){
  if(!text)return '';
  try{
    if(typeof marked!=='undefined'&&marked.parse){
      var html=marked.parse(text,{breaks:true,gfm:true});
      // 基础安全处理：移除 script 标签和事件处理器
      html=html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi,'');
      html=html.replace(/\son\w+\s*=\s*(?:"[^"]*"|'[^']*'|\S+)/gi,'');
      return html;
    }
  }catch(e){}
  // fallback: 手动渲染图片 markdown，其余转义
  var safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 把 ![](url) 转成 <img>
  safe=safe.replace(/!\[(.*?)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%;border-radius:6px;margin:6px 0">');
  return safe;
}

function setMsgContent(el,text){
  el.innerHTML=renderMarkdown(text);
  // 代码语法高亮
  try{
    if(typeof hljs!=='undefined'&&hljs.highlightElement){
      var blocks=el.querySelectorAll('pre code');
      for(var i=0;i<blocks.length;i++){
        try{hljs.highlightElement(blocks[i]);}catch(e2){}
      }
    }
  }catch(e){console.log('hljs error:',e)}
  // 代码块装饰：语言标签 + 复制按钮
  decorateCodeBlocks(el);
}

// ─── 文件下载按钮 ───
function renderFileButtons(container,files){
  if(!files||!files.length)return;
  for(var fi=0;fi<files.length;fi++){
    var f=files[fi];
    var fn=f.filename||f.name||'file';
    var url=f.url||'';
    if(!url)continue;
    var href=url.indexOf('://')>=0?url:(window.location.origin+url);
    var div=document.createElement('div');
    div.style.cssText='display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--accent);border-radius:6px;padding:6px 10px;margin-top:6px;font-size:12px';
    div.innerHTML='<span style="font-size:14px;margin-right:4px">📄</span><span style="font-size:12px">'+fn+'</span><a href="'+href+'" target="_blank" style="background:var(--accent);color:#fff;border:none;border-radius:4px;padding:2px 10px;font-size:12px;cursor:pointer;text-decoration:none;margin-left:8px" download>\u2b07 \u4e0b\u8f7d</a>';
    container.appendChild(div);
  }
}

// ─── 代码块装饰（语言标签 + 复制按钮） ───
function decorateCodeBlocks(el){
  var pres=el.querySelectorAll('pre');
  for(var i=0;i<pres.length;i++){
    var pre=pres[i];
    // 已装饰的跳过
    if(pre.previousElementSibling&&pre.previousElementSibling.classList.contains('code-header')) continue;
    var code=pre.querySelector('code');
    if(!code) continue;
    // 提取语言
    var lang='code';
    for(var j=0;j<code.classList.length;j++){
      var cls=code.classList[j];
      if(cls.indexOf('language-')===0){lang=cls.slice(9);break}
    }
    // 如果 marked 没标注语言，用 hljs 自动检测（支持 190+ 语言）
    if(lang==='code'&&typeof hljs!=='undefined'&&hljs.highlightAuto){
      try{
        var result=hljs.highlightAuto(code.textContent);
        if(result.language) lang=result.language;
      }catch(e){}
    }
    // 创建头部
    var header=document.createElement('div');
    header.className='code-header';
    var langSpan=document.createElement('span');
    langSpan.className='code-lang';
    langSpan.textContent=lang;
    header.appendChild(langSpan);
    var codeText=code.textContent;
    var copyBtn=document.createElement('button');
    copyBtn.className='code-copy';
    copyBtn.textContent=_t('copy');
    copyBtn.onclick=function(txt,btn){
      return function(){
        navigator.clipboard.writeText(txt).then(function(){
          btn.textContent=_t('copied');
          btn.classList.add('copied');
          setTimeout(function(){btn.textContent=_t('copy');btn.classList.remove('copied')},2000);
        }).catch(function(){
          var ta=document.createElement('textarea');
          ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
          document.body.appendChild(ta);ta.select();
          try{document.execCommand('copy');btn.textContent=_t('copied');btn.classList.add('copied');setTimeout(function(){btn.textContent=_t('copy');btn.classList.remove('copied')},2000)}catch(e){}
          document.body.removeChild(ta);
        });
      };
    }(codeText,copyBtn);
    header.appendChild(copyBtn);
    pre.parentNode.insertBefore(header,pre);
  }
}

function typeQuote(text){
  var el=$('quoteLine');
  el.textContent='';
  el.style.display='block';
  el.style.minHeight='40px';
  el.style.fontSize='13px';
  el.style.color='var(--accent)';
  el.style.fontStyle='italic';
  el.style.opacity='0';
  el.style.transition='opacity .5s';

  // 先淡入
  setTimeout(function(){
    el.style.opacity='1';

    // 逐字输出
    var idx=0;
    var ti=setInterval(function(){
      if(idx<text.length){
        el.textContent=text.slice(0,idx+1);
        var c=text.charAt(idx);
        // 暂停一下对标点
        var delay=(c==='，'||c==='。'||c==='！'||c==='？'||c==='——')?120:30;
        idx++;
        if(ti) clearInterval(ti);
        ti=setInterval(arguments.callee,delay);
      }else{
        clearInterval(ti);
        el.style.cursor='none';
        // 末尾闪烁光标
        el.textContent=text+'|';
        var blink=setInterval(function(){
          if(el.textContent.endsWith('|')) el.textContent=el.textContent.slice(0,-1);
          else el.textContent=text+'|';
        },500);
      }
    },30);
  },200);
}

function updateSessionLabel(){

  var el=$('curSession');
  if(el.getAttribute('data-target')===label)return;
  el.setAttribute('data-target',label);
  el.textContent='';

function addMsg(text,role,t,files){
  var fileList=Array.isArray(files)?files:(files?[files]:[]);
  var msgs=loadMsgs();msgs.push({text:text,role:role,files:fileList});saveMsgs(msgs);
  var typing=document.querySelector('.msg.bot.typing');
  if(typing)typing.remove();
  var d=document.createElement('div');
  d.className='msg '+(role==='user'?'me':'bot');
  chat.appendChild(d);
  if(t&&role==='bot'){
    // 打字效果：逐字渲染 Markdown
    setMsgContent(d,'');
    var idx=0,lastIdx=0,ti=setInterval(function(){
      if(idx<text.length){
        idx++;
        if(idx-lastIdx>=3||idx>=text.length){
          setMsgContent(d,text.slice(0,idx));
          lastIdx=idx;
          chat.scrollTop=chat.scrollHeight;
        }
      } else {
        clearInterval(ti);
        setMsgContent(d,text);
        if(fileList.length>0) renderFileButtons(d,fileList);
        chat.scrollTop=chat.scrollHeight;
      }
    },18);
  }else{
    // 直接渲染 Markdown
    setMsgContent(d,text);
    chat.scrollTop=chat.scrollHeight;
  }
  console.log('DL_DEBUG: files='+fileList.length+' role='+role);
  // 文件下载按钮（仅非打字场景或打字完成后已渲染）
  if(!(t&&role==='bot') && fileList.length>0){
    renderFileButtons(d,fileList);
  }
}

function showTyping(){
  var d=document.createElement('div');
  d.className='msg bot typing';
  d.innerHTML='<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){
  var t=document.querySelector('.msg.bot.typing');
  if(t)t.remove();
}
function removeToolIndicator(){
  var el=document.getElementById('toolIndicator');
  if(el)el.remove();
}
function escapeHtml(s){
  if(typeof s!=='string')return ''+s;
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToolCall(name, args, status, errMsg){
  // 更新或追加工具调用指示器
  var el=document.getElementById('toolIndicator');
  if(!el){
    el=document.createElement('div');
    el.id='toolIndicator';
    el.className='msg tool-indicator';
    chat.appendChild(el);
  }
  var argsPreview='';
  if(args&&typeof args==='object'){
    var vals=Object.values(args).filter(function(v){return typeof v==='string'}).map(function(v){return v.length>30?v.slice(0,30)+'...':v}).join(', ');
    if(vals)argsPreview=' ('+vals+')';
  }
  if(status==='success'){
    el.innerHTML='<span class="ti-icon">✅</span> <span class="ti-name">'+name+'</span>'+escapeHtml(argsPreview)+' <span class="ti-done">完成</span>';
  }else if(status==='error'){
    el.innerHTML='<span class="ti-icon">⚠️</span> <span class="ti-name">'+name+'</span>'+escapeHtml(argsPreview)+' <span class="ti-err">失败: '+(errMsg||'')+'</span>';
  }else{
    // 正在执行
    el.innerHTML='<span class="ti-icon">⏳</span> <span class="ti-name">'+name+'</span>'+escapeHtml(argsPreview)+' <span class="ti-doing">执行中...</span>';
  }
  chat.scrollTop=chat.scrollHeight;
}

function send(){
  if(LOADING||!TOKEN)return;
  var text=input.value.trim();if(!text)return;
  input.value='';input.style.height='auto';
  addMsg(text,'user');showTyping();LOADING=true;sendBtn.disabled=true;
  // 轮询进度
  var reqId='';
  function pollProgress(){
    if(!LOADING||!reqId)return;
    var p=new XMLHttpRequest();
    p.open('GET',HOST+'/chat/progress?req='+reqId);
    p.setRequestHeader('Authorization','Bearer '+TOKEN);
    p.onload=function(){try{
      var d=JSON.parse(p.responseText);
      if(d&&d.name){
        showToolCall(d.name, d.args, d.status, d.error);
      }
    }catch(e){};
    if(LOADING)setTimeout(pollProgress,600)};
    p.send();
  }
  // 流式 ndjson 请求
  var _lastPos=0;
  var x=new XMLHttpRequest();
  x.open('POST',HOST+'/chat');
  x.timeout=300000;
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onreadystatechange=function(){
    if(x.status===401&&x.readyState===4){LS.removeItem('hedera_token');TOKEN='';showLogin();LOADING=false;sendBtn.disabled=false;return}
    // 获取请求 ID 用于轮询
    if(x.readyState===2){
      reqId=x.getResponseHeader('X-Request-Id')||'';
      if(reqId)setTimeout(pollProgress,600);
    }
    // 实时工具调用（增量解析，行可能不完整但工具事件通常在独立行）
    if(x.readyState===3){
      var raw=x.responseText||'';
      var newPart=raw.slice(_lastPos);
      _lastPos=raw.length;
      if(newPart){
        var lines=newPart.split('\n');
        for(var i=0;i<lines.length;i++){
          var line=lines[i].trim();
          if(!line)continue;
          try{
            var ev=JSON.parse(line);
            if(ev.type==='tool')showToolCall(ev.name, ev.args, ev.status, ev.error);
          }catch(e2){}
        }
      }
    }
    // 请求完成：完整解析所有行（确保跨 chunk 的行也能处理）
    if(x.readyState===4){
      if(x.status===401){LS.removeItem('hedera_token');TOKEN='';showLogin();LOADING=false;sendBtn.disabled=false;return}
      var raw=x.responseText||'';
      var lines=raw.split('\n');
      var foundDone=false;
      for(var i=0;i<lines.length;i++){
        var line=lines[i].trim();
        if(!line)continue;
        try{
          var ev=JSON.parse(line);
          if(ev.type==='tool'){
            showToolCall(ev.name, ev.args, ev.status, ev.error);
          }else if(ev.type==='result'){
            foundDone=true;
            hideTyping();removeToolIndicator();
            LOADING=false;sendBtn.disabled=false;
            var rt=ev.response||'';
            if(rt)addMsg(rt,'bot',true,ev.files||[]);
            else addMsg(ev.error||'已处理','bot');
            if(ev.session_id&&ev.session_id!==SESSION_ID){
              SESSION_ID=ev.session_id;LS.setItem('hedera_session_id',SESSION_ID);
            }
            loadSessions();
            if(!SESSION_LABEL&&text){SESSION_LABEL=text.slice(0,40);LS.setItem('hedera_session_label',SESSION_LABEL);updateSessionLabel();}
            input.focus();
          }else if(ev.type==='error'){
            foundDone=true;
            hideTyping();removeToolIndicator();
            LOADING=false;sendBtn.disabled=false;
            addMsg('错误: '+(ev.error||'未知错误'),'bot');input.focus();
          }
        }catch(e2){}
      }
      if(!foundDone&&LOADING){
        hideTyping();removeToolIndicator();
        LOADING=false;sendBtn.disabled=false;
        try{var d=JSON.parse(raw);if(d.response)addMsg(d.response,'bot',true,d.files);else addMsg('连接失败，刷新重试','bot');
        }catch(e){addMsg('连接失败，刷新重试','bot')}
        input.focus();
      }
    }
  };
  x.ontimeout=function(){hideTyping();removeToolIndicator();LOADING=false;sendBtn.disabled=false;addMsg('请求超时（超过5分钟），刷新重试','bot')};
  x.onerror=function(){hideTyping();removeToolIndicator();LOADING=false;sendBtn.disabled=false;addMsg('连接失败，请刷新页面重试','bot')};
  x.send(JSON.stringify({message:text,session_id:SESSION_ID||null}));
}
input.onkeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};
input.oninput=function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'};
sendBtn.onclick=send;

// ─── TTS 语音朗读（浏览器原生 + API 双模式）───
var _ttsEnabled=false;
var _ttsApiMode=false;  // 启动后从 config 读取
var _ttsUtterance=null;
var _ttsAudioEl=null;

// 从 config 加载 TTS API 模式
function loadTtsMode(){
  var cb=$('cfgTtsToggle');
  if(!cb)return;
  cb.onchange=function(){
    _ttsEnabled=cb.checked;
    localStorage.setItem('hedera_tts',_ttsEnabled?'1':'0');
    if(!_ttsEnabled){
      if(window.speechSynthesis)window.speechSynthesis.cancel();
      if(_ttsAudioEl){_ttsAudioEl.pause();_ttsAudioEl=null}
    }
  };
  var saved=localStorage.getItem('hedera_tts');
  if(saved==='1'){cb.checked=true;_ttsEnabled=true}
  // Load API mode from config
  var x=new XMLHttpRequest();
  x.open('GET',HOST+'/config');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){try{
    var d=JSON.parse(x.responseText);
    _ttsApiMode=!!(d.tts&&d.tts.enabled&&d.tts.api_key_masked&&d.tts.api_key_masked!=='未配置');
  }catch(e){}};
  x.send();
}
// (loadTtsMode is also called in initChat)




function speakText(text){
  if(!_ttsEnabled||!text)return;
  // 去掉 markdown 图片、链接、代码块、粗体等，只留纯文字
  // 去掉 markdown 图片、链接、代码块；去掉所有 HTTP 路径（防止 TTS 读链接）
  var cleanText=text.replace(/!\[.*?\]\(.*?\)/g,'').replace(/\[.*?\]\(.*?\)/g,'').replace(/`{1,3}[^`]*`{1,3}/g,'').replace(/https?:\/\/[^\s]+/g,'').replace(/[*_~>`#|\-]+/g,' ').replace(/\s+/g,' ').trim().substring(0,2000);
  
  if(_ttsApiMode){
    // API 模式：调后端 /api/tts → 返回本地音频 URL → 播放
    if(_ttsAudioEl){_ttsAudioEl.pause();_ttsAudioEl=null}
    var x=new XMLHttpRequest();
    x.open('POST',HOST+'/api/tts');
    x.setRequestHeader('Content-Type','application/json');
    x.setRequestHeader('Authorization','Bearer '+TOKEN);
    x.onload=function(){try{
      var d=JSON.parse(x.responseText);
      if(d.status==='ok'&&d.url){
        _ttsAudioEl=document.createElement('audio');
        _ttsAudioEl.src=HOST+d.url;
        _ttsAudioEl.autoplay=true;
        _ttsAudioEl.onended=function(){_ttsAudioEl=null};
        document.body.appendChild(_ttsAudioEl);
        _ttsAudioEl.play();
      }
    }catch(e){}};
    x.send(JSON.stringify({text:cleanText}));
  }else{
    // 浏览器原生模式
    window.speechSynthesis.cancel();
    _ttsUtterance=new SpeechSynthesisUtterance(cleanText);
    _ttsUtterance.lang='zh-CN';
    _ttsUtterance.rate=1.0;
    _ttsUtterance.pitch=1.0;
    var voices=window.speechSynthesis.getVoices();
    for(var i=0;i<voices.length;i++){
      if(voices[i].lang.startsWith('zh')){_ttsUtterance.voice=voices[i];break}
    }
    window.speechSynthesis.speak(_ttsUtterance);
  }
}
// 预加载语音列表（某些浏览器需要触发）

// 在 addMsg 末尾增加朗读触发
var _origAddMsg=addMsg;
addMsg=function(text,role,t,files){
  _origAddMsg(text,role,t,files);
  if(role==='bot'&&_ttsEnabled&&text){
    setTimeout(function(){speakText(text)},100);
  }
};

function uploadFile(){
  var f=this.files[0];if(!f)return;
  addMsg(_t('uploading').replace('{name}',f.name),'user');showTyping();LOADING=true;sendBtn.disabled=true;
  var fd=new FormData();fd.append('file',f);fd.append('session_id',SESSION_ID||'');
  var x=new XMLHttpRequest();
  x.open('POST',HOST+'/upload');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    try{
      var d=JSON.parse(x.responseText);
      if(d.status==='ok'&&d.file){
        var fileInfo=d.file;
        addMsg(_t('uploadedFile').replace('{name}',fileInfo.name),'user',false,fileInfo);
        var msg=_t('uploadedFile').replace('{name}',fileInfo.name)+' ('+fileInfo.url+')';
        var chatReq=new XMLHttpRequest();
        chatReq.open('POST',HOST+'/chat');
        chatReq.timeout=120000;
        chatReq.setRequestHeader('Content-Type','application/json');
        chatReq.setRequestHeader('Authorization','Bearer '+TOKEN);
        chatReq.onload=function(){
          try{var r=JSON.parse(chatReq.responseText);
            if(r.response)addMsg(r.response,'bot',true,r.files);
            else addMsg('错误: '+r.error,'bot');
          }catch(e){addMsg('响应解析失败','bot')}
          LOADING=false;
        };
        chatReq.ontimeout=function(){addMsg('请求超时，刷新重试','bot');LOADING=false};
        chatReq.onerror=function(){addMsg('连接失败，请刷新页面','bot');LOADING=false};
        chatReq.send(JSON.stringify({message:msg,session_id:SESSION_ID||null}));
      }else{addMsg('上传失败','bot');LOADING=false}
    }catch(e){addMsg('解析失败','bot');LOADING=false}
    $('fileInput').value='';
  };
  x.onerror=function(){addMsg(_t('connFailed')+': 网络错误','bot')};
  x.send(fd);
}

// ─── 会话管理 ───
function updateSessList(){
  var cur=$('sessList').querySelector('.session-item.active');
  if(cur)cur.classList.remove('active');
  var el=$('sessList').querySelector('[data-sid="'+SESSION_ID+'"]');
  if(el)el.classList.add('active');
}

function loadSessions(){
  var x=new XMLHttpRequest();
  x.open('GET',HOST+'/sessions');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    if(x.status!==200){$('sessList').innerHTML='<div class="empty-hint">加载失败</div>';return}
    var d=JSON.parse(x.responseText);
    var sessions=(d.sessions||[]).filter(function(s){return s.session_id&&(s.message_count>0||s.session_id===SESSION_ID)});
    var html='';
    if(!sessions.length)html='<div class="empty-hint">'+_t('noSessions')+'</div>';
    else for(var i=0;i<sessions.length;i++){
      var s=sessions[i];
      var active=s.session_id===SESSION_ID;
      var label=s.title||pname||s.session_id.slice(0,24);
      var msgs=s.message_count||0;
      var last=(s.last_active||'').replace('2026-','');
      var pf=s.profile||'';
      var pname='冬青';
      if(pf.indexOf('茯苓')>=0)pname='茯苓';
      else if(pf.indexOf('冬青')>=0)pname='冬青';
      var slabel=s.title||'';
      html+='<div class="session-item'+(active?' active':'')+'" data-sid="'+s.session_id+'" data-title="'+slabel+'" data-profile="'+pname+'">';
      html+='<div class="sline"><span class="sname">'+label+'</span><span class="sbadge'+(active?' show':'')+'">当前</span><button class="sdel" data-del="'+s.session_id+'">&times;</button></div>';
      html+='<div class="smeta">'+msgs+' 条消息 <span style="color:var(--accent);font-size:10px">'+pname+'</span></div></div>';
    }
    $('sessList').innerHTML=html;
    // 绑定事件
    $('sessList').querySelectorAll('.session-item').forEach(function(el){
      el.addEventListener('click',function(e){
        if(e.target.closest('.sdel'))return;
        var sid=this.getAttribute('data-sid');
        if(sid===SESSION_ID){toggleSidebar(false);return}
        SESSION_ID=sid;
        // 从 data-title 恢复会话标题
        var sel=$('sessList').querySelector('[data-sid="'+sid+'"]');
        var stitle=sel?sel.getAttribute('data-title')||'':'';
        SESSION_LABEL=stitle;
        if(stitle){LS.setItem('hedera_session_label',stitle)}else{LS.removeItem('hedera_session_label')}
        LS.setItem('hedera_session_id',sid);
        updateSessionLabel();loadSessionMessages(sid);
        updateSessList();toggleSidebar(false);input.focus();
        // 从会话列表中找到该会话的人格名
        var sels=$('sessList').querySelector('[data-sid="'+sid+'"]');
        if(sels){var pf=sels.getAttribute('data-profile');if(pf)CURRENT_PROFILE_NAME=pf;updateEmptyText()}
      });
    });
    $('sessList').querySelectorAll('.sdel').forEach(function(btn){
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        var sid=this.getAttribute('data-del');
        if(!confirm(_t('deleteSess')))return;
        var chatReq=new XMLHttpRequest();
        chatReq.open('DELETE',HOST+'/sessions/'+encodeURIComponent(sid));
        chatReq.setRequestHeader('Authorization','Bearer '+TOKEN);
        chatReq.onload=function(){
          if(chatReq.status===200){
            if(SESSION_ID===sid){SESSION_ID='';SESSION_LABEL='';LS.removeItem('hedera_session_id');LS.removeItem('hedera_session_label');updateSessionLabel();loadSessionMessages('')}
            loadSessions();
            toggleSidebar(false);
          }
        };
        chatReq.send();
      });
    });
  };
  x.onerror=function(){$('sessList').innerHTML='<div class="empty-hint">'+_t('networkError')+'</div>'};
  x.send();
}

// ─── 自省 ───
var REFRESH_TAB='reflog';
var REFRESH_INTERVAL=null;

function loadReflection(){
  document.querySelectorAll('#reflectionTab .rtab').forEach(function(tab){
    tab.onclick=function(){
      document.querySelectorAll('#reflectionTab .rtab').forEach(function(t){t.classList.remove('active')});
      this.classList.add('active');
      REFRESH_TAB=this.getAttribute('data-tab');
      loadReflectionData();
    };
  });
  if(REFRESH_INTERVAL)clearInterval(REFRESH_INTERVAL);
  loadReflectionData();
  REFRESH_INTERVAL=setInterval(loadReflectionData,30000);
}

function loadReflectionData(){
  var x=new XMLHttpRequest();
  x.open('GET',HOST+'/api/status');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    if(x.status!==200){$('reflectionContent').innerHTML='<div class="empty-hint">加载失败</div>';return}
    var d=JSON.parse(x.responseText);
    var html='';
    var tab=REFRESH_TAB;
    if(tab==='reflog'){
      var logs=d.reflections||[];
      if(!logs.length)html='<div class="empty-hint">暂无反思</div>';
      else for(var i=logs.length-1;i>=0;i--){
        var l=logs[i];
        var time=l.split('【')[1]?l.split('【')[1].split('】')[0]||'':'';
        var content=l.replace('【'+time+'】','');
        html+='<div class="ref-item"><div class="rtime">'+time+'</div><div class="rcontent">'+content.slice(0,200)+'</div></div>';
      }
    }else if(tab==='experience'){
      var exps=d.experiences||[];
      if(!exps.length)html='<div class="empty-hint">暂无蒸馏</div>';
      else for(var i=exps.length-1;i>=0;i--){
        var e=exps[i];
        var rules=(e.rules||[]).join('; ');
        html+='<div class="ref-item"><div class="rtime">'+e.time+'</div><div class="rcontent">'+rules.slice(0,200)+'</div></div>';
      }
    }else if(tab==='rules'){
      var rules=d.rules||[];
      if(!rules.length)html='<div class="empty-hint">暂无准则</div>';
      else for(var i=0;i<rules.length;i++){
        html+='<div class="ref-item"><div class="rcontent">'+(i+1)+'. '+rules[i]+'</div></div>';
      }
    }
    html+='<div class="ref-refresh" id="refRefreshBtn">↻ 刷新</div>';
    $('reflectionContent').innerHTML=html;
    var btn=$('refRefreshBtn');
    if(btn)btn.onclick=function(){loadReflectionData()};
  };
  x.onerror=function(){$('reflectionContent').innerHTML='<div class="empty-hint">'+_t('networkError')+'</div>'};
  x.send();
}

// ─── 新建会话人格选择 ───

  x.onload=function(){
    if(x.status!==200)return;

      updateEmptyText();
    }

  x.send();
}

function switchProfile(file,name){
  $('profileList').innerHTML='<div class="empty-hint">切换中...</div>';
  var x=new XMLHttpRequest();
  x.open('POST',HOST+'/api/profile');
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    if(x.status!==200){
      var d=JSON.parse(x.responseText);
      alert('切换失败: '+(d.error||'未知错误'));
      loadProfiles();
      return;
    }
    var d=JSON.parse(x.responseText);
    // 清除本地消息缓存（人格变了，旧消息上下文不再适用）
    var keys=[];
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k.startsWith('hedera_msgs_'))keys.push(k);
    }
    keys.forEach(function(k){localStorage.removeItem(k)});
    // 清空聊天区域，等待新对话
    chat.innerHTML='';
    loadProfiles();
  };
  x.onerror=function(){
    alert(_t('networkError'));
    loadProfiles();
  };
  x.send(JSON.stringify({profile:file}));
}

// ─── 设置 ───
function setStatus(msg,type){$('cfgStatus').textContent=msg;$('cfgStatus').className='sstatus'+(type?' '+type:'')}
function loadConfig(){
  setStatus(_t('loading'));
  var x=new XMLHttpRequest();
  x.open('GET',HOST+'/config');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    if(x.status===200){
      var d=JSON.parse(x.responseText);
      $('cfgModelKey').placeholder=_LANG==='zh'?($('cfgModelKey').placeholder='已配置: '+(d.model&&d.model.api_key_masked||'')||'未配置'):'Configured: '+(d.model&&d.model.api_key_masked||'')||'Not configured';
      if(d.model&&d.model.name)$('cfgModelName').placeholder='当前: '+d.model.name;
      if(d.model&&d.model.endpoint)$('cfgModelEndpoint').placeholder='当前: '+d.model.endpoint;
      if(d.search_providers)for(var i=0;i<d.search_providers.length;i++)if(d.search_providers[i].name==='tavily')$('cfgTavilyKey').placeholder=_LANG==='zh'?'已配置: '+(d.search_providers[i].api_key_masked||''):'Configured: '+(d.search_providers[i].api_key_masked||'');
      // 图像生成配置
      if(d.image_gen){
        var ig=d.image_gen;
        if(ig.model)$('cfgImgModel').placeholder='当前: '+ig.model;
        if(ig.endpoint)$('cfgImgEndpoint').placeholder='当前: '+ig.endpoint;
        $('cfgImgKey').placeholder=_LANG==='zh'?'已配置: '+(ig.api_key_masked||''):'Configured: '+(ig.api_key_masked||'');
      }
      // TTS 配置
      if(d.tts){
        var ts=d.tts;
        if(ts.model)$('cfgTtsModel').placeholder='当前: '+ts.model;
        if(ts.voice)$('cfgTtsVoice').placeholder='当前: '+ts.voice;
        $('cfgTtsKey').placeholder=_LANG==='zh'?'已配置: '+(ts.api_key_masked||''):'Configured: '+(ts.api_key_masked||'');
      }
      setStatus('');
    }
  };
  x.onerror=function(){setStatus('加载失败','err')};
  x.send();
}
$('cfgSave').onclick=function(){
  var body={};
  var mk=$('cfgModelKey').value.trim();if(mk)body.model_api_key=mk;
  var mn=$('cfgModelName').value.trim();if(mn)body.model_name=mn;
  var me=$('cfgModelEndpoint').value.trim();if(me)body.model_endpoint=me;
  var tk=$('cfgTavilyKey').value.trim();if(tk)body.search_keys={tavily:tk};
  var im=$('cfgImgModel').value.trim();if(im)body.image_gen_model=im;
  var ie=$('cfgImgEndpoint').value.trim();if(ie)body.image_gen_endpoint=ie;
  var ik=$('cfgImgKey').value.trim();if(ik)body.image_gen_key=ik;
  var tm=$('cfgTtsModel').value.trim();if(tm)body.tts_model=tm;
  var tv=$('cfgTtsVoice').value.trim();if(tv)body.tts_voice=tv;
  var te=$('cfgTtsEndpoint').value.trim();if(te)body.tts_endpoint=te;
  var tk=$('cfgTtsKey').value.trim();if(tk)body.tts_key=tk;
  if(!Object.keys(body).length){setStatus(_t('noChange'),'err');return}
  $('cfgSave').disabled=true;setStatus(_t('saving')+'...');
  var x=new XMLHttpRequest();
  x.open('POST',HOST+'/config');
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    if(x.status===200){
      setStatus('已保存','ok');$('cfgModelKey').value='';$('cfgModelName').value='';$('cfgModelEndpoint').value='';$('cfgTavilyKey').value='';$('cfgImgKey').value='';$('cfgImgModel').value='';$('cfgImgEndpoint').value='';$('cfgTtsKey').value='';$('cfgTtsModel').value='';$('cfgTtsVoice').value='';$('cfgTtsEndpoint').value='';
      loadConfig();
    }else setStatus(_t('saveFailed'),'err');
    $('cfgSave').disabled=false;
  };
  x.onerror=function(){setStatus(_t('networkError'),'err');$('cfgSave').disabled=false};
  x.send(JSON.stringify(body));
};

// ─── 预设管理 ───
function getPresets(){
  try{return JSON.parse(localStorage.getItem('hedera_presets')||'[]')}catch(e){return []}
}
function savePresets(list){
  localStorage.setItem('hedera_presets',JSON.stringify(list))
}

// ─── 预设管理 (分类: llm / img / tts) ───
var PRESET_CATS={llm:{fields:['cfgModelName','cfgModelEndpoint','cfgModelKey']},
  img:{fields:['cfgImgModel','cfgImgEndpoint','cfgImgKey']},
  tts:{fields:['cfgTtsModel','cfgTtsVoice','cfgTtsEndpoint','cfgTtsKey']}};

function getPresets(cat){try{return JSON.parse(localStorage.getItem('hedera_'+cat)||'[]')}catch(e){return[]}}
function savePresets(cat,list){localStorage.setItem('hedera_'+cat,JSON.stringify(list))}
function refreshPresetList(cat){
  var sel=$(cat==='llm'?'cfgPresetLlm':cat==='img'?'cfgPresetImg':'cfgPresetTts');if(!sel)return;
  var presets=getPresets(cat);
  sel.innerHTML='<option value="">-- '+cat.toUpperCase()+' --</option>';
  for(var i=0;i<presets.length;i++)sel.innerHTML+='<option value="'+i+'">'+presets[i].name+'</option>'
}
window.savePreset=savePreset;
function savePreset(cat){
  var name=$('cfgPresetName').value.trim();if(!name)return;
  var data={name:name};
  var fields=PRESET_CATS[cat].fields;
  for(var i=0;i<fields.length;i++){var el=$(fields[i]);if(el)data[fields[i]]=el.value}
  var presets=getPresets(cat);
  for(var i=0;i<presets.length;i++){if(presets[i].name===name){presets.splice(i,1);break}}
  presets.push(data);
  savePresets(cat,presets);
  refreshPresetList(cat);
  // auto-select saved preset
  var sid=cat==='llm'?'cfgPresetLlm':cat==='img'?'cfgPresetImg':'cfgPresetTts';var sel=document.getElementById(sid);if(sel){for(var i=0;i<sel.options.length;i++){if(sel.options[i].text===name){sel.selectedIndex=i;break}}}
  $('cfgPresetName').value='';
  setStatus('已保存 '+cat+': '+name,'ok');
}
window.loadPreset=loadPreset;
function loadPreset(cat){
  var sel=$(cat==='llm'?'cfgPresetLlm':cat==='img'?'cfgPresetImg':'cfgPresetTts');if(!sel||sel.value==='')return;
  var presets=getPresets(cat);var p=presets[parseInt(sel.value)];if(!p)return;
  var fields=PRESET_CATS[cat].fields;
  for(var i=0;i<fields.length;i++){var el=$(fields[i]);if(el&&p[fields[i]])el.value=p[fields[i]]}
  setStatus('已加载 '+cat+': '+p.name,'ok');
}
window.delPreset=delPreset;
function delPreset(cat){
  var sel=$(cat==='llm'?'cfgPresetLlm':cat==='img'?'cfgPresetImg':'cfgPresetTts');if(!sel||sel.value==='')return;
  var presets=getPresets(cat);var name=presets[parseInt(sel.value)].name;
  presets.splice(parseInt(sel.value),1);savePresets(cat,presets);refreshPresetList(cat);
  setStatus('已删除 '+cat+': '+name,'ok');
}
function applyPreset(cat){
  // 加载预设 + 保存到服务端配置
  var sel=$(cat==='llm'?'cfgPresetLlm':cat==='img'?'cfgPresetImg':'cfgPresetTts');if(!sel||sel.value==='')return;
  var presets=getPresets(cat);var p=presets[parseInt(sel.value)];if(!p)return;
  var fields=PRESET_CATS[cat].fields;
  for(var i=0;i<fields.length;i++){var el=$(fields[i]);if(el&&p[fields[i]])el.value=p[fields[i]]}
  // 触发保存
  $('cfgSave').click();
  setStatus('已应用 '+cat+': '+p.name,'ok');
}
// 进入设置时刷新所有预设列表
function refreshAllPresets(){refreshPresetList('llm');refreshPresetList('img');refreshPresetList('tts')}
var _origLC=loadConfig;loadConfig=function(){_origLC();refreshAllPresets()};

window.testConn=testConn;
function testConn(cat){
  var fields=PRESET_CATS[cat].fields;
  var data={};
  for(var i=0;i<fields.length;i++){var el=$(fields[i]);if(el)data[fields[i]]=el.value}
  if(!data[fields[fields.length-1]]){setStatus('请先填写 '+cat+' 的 API Key','err');return}
  setStatus('测试 '+cat+' 连接中...','');
  var x=new XMLHttpRequest();
  x.open('POST',HOST+'/test_conn');
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){try{var d=JSON.parse(x.responseText);setStatus(d.ok?'连接成功':'连接失败: '+d.error,d.ok?'ok':'err')}catch(e){setStatus('响应解析失败','err')}};
  x.onerror=function(){setStatus('网络错误','err')};
  x.send(JSON.stringify({cat:cat,fields:data}));
}
