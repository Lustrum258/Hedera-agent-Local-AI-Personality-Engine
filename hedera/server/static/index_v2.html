<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>常春藤 · 冬青</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" href="/icon.png" type="image/png" sizes="256x256">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0b10;--surface:#16161f;--border:#232336;--text:#dedee8;--dim:#787890;--dim-bg:#1a1a28;--accent:#6c8c6c;--accent2:#4a6a4a;--accent3:#2a3a2a;--msg-bot:#16161f;--msg-user:#1a2626;--radius:12px;--sbw:320px;--font:-apple-system,'PingFang SC','Noto Sans SC',system-ui,sans-serif;--mono:'Cascadia Code','JetBrains Mono','Fira Code','Consolas','DejaVu Sans Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100dvh;display:flex;overflow:hidden}

/* ── 关键帧 ── */
@keyframes fadeSlideIn{0%{opacity:0;transform:translateY(10px) scale(.97)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
@keyframes dotPulse{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes breathe{0%,100%{box-shadow:0 0 4px #6c8}50%{box-shadow:0 0 12px #6c8,0 0 24px #6c84}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideIn{0%{transform:translateX(-100%)}100%{transform:translateX(0)}}
@keyframes slideOut{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}

/* ── 侧边栏 ── */
#sidebar{width:var(--sbw);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:20;transition:width .3s cubic-bezier(.4,0,.2,1),border-color .3s ease}
#sidebar.collapsed{width:0;min-width:0;border-right-color:transparent}
#sidebar .logo{padding:16px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
#sidebar .logo svg{flex-shrink:0}
#sidebar .logo h1{font-size:17px;font-weight:600}
#sidebar .logo .close-sb{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:0;margin-left:auto;transition:color .2s}
#sidebar .logo .close-sb:hover{color:var(--text)}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 10px}
.sb-scroll::-webkit-scrollbar{width:5px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* 侧边栏分区 */
.sb-section{border-bottom:1px solid var(--border)}
.sb-section .sb-head{padding:12px 18px;font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;transition:color .2s}
.sb-section .sb-head:hover{color:var(--text)}
.sb-section .sb-head .arrow{font-size:10px;transition:transform .2s}
.sb-section .sb-head .arrow.open{transform:rotate(90deg)}
.sb-section .sb-body{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1),padding .3s ease;opacity:0;transition:max-height .3s cubic-bezier(.4,0,.2,1),padding .3s ease,opacity .25s ease}
.sb-section .sb-body.open{max-height:9999px;padding:0 14px 14px;opacity:1}

/* 会话列表 */
.session-item{padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.session-item:hover{border-color:var(--accent);background:var(--accent3)40}
.session-item .sline{display:flex;align-items:center;gap:8px}
.session-item .sline .sname{font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item .sline .sbadge{font-size:10px;background:var(--accent);color:#fff;border-radius:4px;padding:2px 6px;display:none}
.session-item .sline .sbadge.show{display:inline}
.session-item .sline .sdel{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;padding:0 4px;opacity:0;transition:all .2s;line-height:1}
.session-item:hover .sline .sdel{opacity:1}
.session-item .sline .sdel:hover{color:#c66}
.session-item .smeta{font-size:12px;color:var(--dim);margin-top:4px}
.session-item.active{border-color:var(--accent);background:var(--accent3)80}
.session-new{display:flex;gap:8px;margin-bottom:12px}
.session-new input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:var(--font);transition:border-color .2s}
.session-new input:focus{border-color:var(--accent)}
.session-new button{background:var(--accent);border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
.session-new button:hover{background:#7da07d}
.empty-hint{color:var(--dim);font-size:13px;text-align:center;padding:16px}
  /* 自省选项卡 */
  #reflectionTab .rtab{padding:10px 14px;font-size:13px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none}
  #reflectionTab .rtab:hover{color:var(--text)}
  #reflectionTab .rtab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .ref-item{padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;word-break:break-all}
  .ref-item .rtime{font-size:11px;color:var(--dim)}
  .ref-item .rcontent{font-size:12px;margin-top:3px}
  .ref-item .rqual{display:inline-block;font-size:10px;background:var(--accent3);color:var(--dim);border-radius:3px;padding:1px 5px;margin-left:4px}
  .ref-refresh{font-size:12px;color:var(--dim);cursor:pointer;padding:6px 0;text-align:center;transition:color .2s}
  .ref-refresh:hover{color:var(--accent)}
  /* 人格切换 */
  .profile-item{padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .2s}
  .profile-item:hover{border-color:var(--accent);background:var(--accent3)40}
  .profile-item.active{border-color:var(--accent2);background:var(--accent3)80;cursor:default}
  .profile-item .pname{font-size:14px;font-weight:500}
  .profile-item .pname .pbadge{font-size:10px;background:var(--accent);color:#fff;border-radius:4px;padding:2px 6px;margin-left:6px;display:none}
  .profile-item .pname .pbadge.show{display:inline}
  .profile-item .ptag{font-size:12px;color:var(--dim);margin-top:3px}

/* 工具列表 */
.tool-item{padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.tool-item .tname{font-size:13px;font-weight:500}
.tool-item .tname .tag{font-size:11px;color:#6c8;margin-left:6px}
.tool-item .tdesc{font-size:12px;color:var(--dim);margin-top:3px}

/* 设置 */
.setting-row{margin-bottom:12px}
.setting-row label{display:block;font-size:12px;color:var(--dim);margin-bottom:5px}
.setting-row input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;font-family:var(--font);transition:border-color .2s}
.setting-row input:focus{border-color:var(--accent)}
.setting-row .sbtn{background:var(--accent);border:none;border-radius:8px;padding:9px 18px;color:#fff;font-size:13px;cursor:pointer;transition:all .2s;margin-top:8px}
.setting-row .sbtn:hover{background:#7da07d}
.setting-row .sbtn.sec{background:var(--accent2);margin-left:8px}
.setting-row .sbtn:disabled{opacity:.4;cursor:default}
.setting-row .sstatus{font-size:12px;margin-top:5px}
.setting-row .sstatus.ok{color:#6c8}
.setting-row .sstatus.err{color:#c66}
/* 设置 Tab */
.cfg-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:12px}
.cfg-tab{flex:1;text-align:center;padding:9px 0;font-size:13px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none}
.cfg-tab:hover{color:var(--text)}
.cfg-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.cfg-pane{display:none}
.cfg-pane.active{display:block}
/* 配置摘要 */
.cfg-summary{padding:10px 12px;background:var(--dim-bg);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;font-size:12px;line-height:1.7}
.cfg-summary .cs-label{color:var(--dim)}
.cfg-summary .cs-val{color:var(--text)}
.cfg-summary .cs-ok{color:#6c8;font-size:11px}
/* 预设卡片 */
.preset-card{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;transition:all .2s}
.preset-card:hover{border-color:var(--accent)}
.preset-card.active-preset{border-color:#6c8;background:var(--accent3)60}
.preset-card .pc-name{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preset-card .pc-badge{font-size:10px;background:#6c8;color:#fff;border-radius:4px;padding:2px 6px;display:none}
.preset-card.active-preset .pc-badge{display:inline}
.preset-card .pc-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--dim);cursor:pointer;transition:all .15s}
.preset-card .pc-btn:hover{border-color:var(--accent);color:var(--text)}
.preset-card .pc-btn.del{color:#c66;border-color:#c664}
.preset-card .pc-btn.del:hover{background:#c662}
.preset-card .pc-btn.apply{background:var(--accent);border-color:var(--accent);color:#fff}
.preset-card .pc-btn.apply:hover{background:#7da07d}
/* 保存指示器 */
.save-indicator{display:inline-block;font-size:12px;color:#6c8;opacity:0;transition:opacity .3s;margin-left:6px}
.save-indicator.show{opacity:1}

/* 侧边栏底部 */
#sidebar .sb-foot{padding:10px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:13px}
#sidebar .sb-foot .sf-dot{width:8px;height:8px;border-radius:50%;transition:all .3s;flex-shrink:0}
#sidebar .sb-foot .sf-dot.on{background:#6c8;box-shadow:0 0 6px #6c8;animation:breathe 2s ease-in-out infinite}
#sidebar .sb-foot .sf-dot.off{background:#666}
#sidebar .sb-foot .sf-label{color:var(--dim);flex-shrink:0}
#sidebar .sb-foot .sf-ver{color:var(--dim);margin-left:auto;font-size:11px}
#sidebar .sb-foot .sf-logout{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:11px;cursor:pointer;padding:4px 8px;transition:all .2s;flex-shrink:0}
#sidebar .sb-foot .sf-logout:hover{border-color:#c66;color:#c66}
#sidebar .sb-foot .sf-clear{font-size:11px;color:var(--dim);cursor:pointer;padding:4px 6px;transition:all .2s;margin-left:auto}
#sidebar .sb-foot .sf-clear:hover{color:#c66}

/* ── 主区域 ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
/* 顶栏 */
#topbar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;position:relative}
#topbar .menu-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);cursor:pointer;font-size:16px;padding:2px 7px;line-height:1.4;transition:all .2s;z-index:1}
#topbar .menu-btn:hover{border-color:var(--accent);color:var(--text)}
#topbar #curSession{position:absolute;left:50%;transform:translateX(-50%);font-size:13px;color:var(--text);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;border-bottom:1px dashed var(--border);padding:0 4px 2px}
  
#topbar .spacer{flex:1;visibility:hidden}
#ctxBar{display:none;font-size:11px;color:var(--dim);padding:2px 16px 0;text-align:right;gap:12px;align-items:center;justify-content:flex-end}
#ctxBar .ctx-item{display:inline-flex;align-items:center;gap:3px}
#ctxBar .ctx-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
#ctxBar .ctx-dot.green{background:#6c8}
#ctxBar .ctx-dot.yellow{background:#ca0}
#ctxBar .ctx-dot.red{background:#c66}
.profile-select{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:3px 6px;cursor:pointer;outline:none;font-family:var(--font);transition:border-color .2s}
.profile-select:focus{border-color:var(--accent)}
.profile-select option{background:var(--surface);color:var(--text)}

/* 聊天 */
#chat{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
#chat:empty::after{content:var(--empty-text,'冬青在等你。');display:block;text-align:center;color:var(--dim);padding:60px 16px;font-size:15px;animation:fadeSlideIn .6s ease-out}
.msg{max-width:82%;padding:10px 14px;border-radius:var(--radius);line-height:1.65;font-size:14px;word-break:break-word;animation:fadeSlideIn .3s ease-out}
.msg.me{background:var(--msg-user);border:1px solid var(--accent2);align-self:flex-end}
.msg.bot{background:var(--msg-bot);border:1px solid var(--border);align-self:flex-start}
.msg.bot.typing{padding:12px 18px;min-width:60px;display:flex;align-items:center;justify-content:center;gap:5px}
.typing-dot{width:8px;height:8px;border-radius:50%;background:var(--dim);display:inline-block;animation:dotPulse 1.4s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}

/* ── Markdown 渲染样式 ── */
.msg p{margin:4px 0;min-height:1.4em;white-space:pre-wrap}
.msg p:first-child{margin-top:0}
.msg p:last-child{margin-bottom:0}
.msg h1,.msg h2,.msg h3,.msg h4{margin:10px 0 4px;font-weight:600;line-height:1.4;color:var(--text)}
.msg h1{font-size:1.25em;border-bottom:1px solid var(--border);padding-bottom:4px}
.msg h2{font-size:1.15em;border-bottom:1px solid var(--border);padding-bottom:3px}
.msg h3{font-size:1.1em}
.msg h4{font-size:1.05em}
.msg strong{font-weight:600}
.msg em{font-style:italic}
.msg ul,.msg ol{padding-left:1.5em;margin:6px 0}
.msg li{margin:2px 0}
.msg li>p{margin:0}
.msg hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.msg blockquote{border-left:3px solid var(--accent);margin:8px 0;padding:4px 12px;color:var(--dim);background:var(--accent3)30;border-radius:0 6px 6px 0}
.msg blockquote p{margin:2px 0}
.msg code{font-family:var(--mono);background:var(--accent3);color:#d4d4e8;padding:1px 5px;border-radius:4px;font-size:.9em}
.msg pre{background:#0e0e17;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:8px 0;overflow-x:auto;position:relative}
.msg pre code{background:none;padding:0;font-size:.88em;line-height:1.55;tab-size:4;white-space:pre}
/* 代码块头部（语言标签 + 复制按钮） */
.msg .code-header{display:flex;align-items:center;justify-content:space-between;padding:4px 12px;background:var(--accent3);border-radius:8px 8px 0 0;border-bottom:1px solid var(--border);font-size:11px;color:var(--dim)}
.msg .code-header .code-lang{font-weight:500;text-transform:lowercase}
.msg .code-header .code-copy{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--dim);font-size:10px;cursor:pointer;padding:3px 10px;transition:all .2s;font-family:var(--font);white-space:nowrap}
.msg .code-header .code-copy:hover{color:var(--accent);border-color:var(--accent)}
.msg .code-header .code-copy.copied{color:#6c8;border-color:#6c8}
.msg .code-header+.msg pre,.msg .code-header+pre{margin-top:0;border-top-left-radius:0;border-top-right-radius:0;border-top:none}
.msg table{border-collapse:collapse;margin:8px 0;font-size:.92em;width:100%;display:block;overflow-x:auto}
.msg th,.msg td{border:1px solid var(--border);padding:5px 10px;text-align:left}
.msg th{background:var(--accent3)60;font-weight:600}
.msg tr:nth-child(even){background:var(--accent3)20}
.msg a{color:#7dab7d;text-decoration:none;border-bottom:1px solid var(--accent2)}
.tool-indicator{background:var(--dim-bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin:6px 0;font-size:12px;line-height:1.5;animation:fadeIn .2s ease}
.tool-indicator .ti-icon{display:inline-block;width:18px}
.tool-indicator .ti-name{font-weight:500}
.tool-indicator .ti-doing{color:var(--accent);margin-left:6px;font-size:11px}
.tool-indicator .ti-done{color:#6c8;margin-left:6px;font-size:11px}
.tool-indicator .ti-err{color:#c66;margin-left:6px;font-size:11px}

.switch{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border);transition:.3s;border-radius:20px}
.switch .slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;transition:.3s;border-radius:50%}
.switch input:checked+.slider{background:var(--accent)}
.switch input:checked+.slider:before{transform:translateX(16px)}
.msg a:hover{color:#9dcc9d}
.msg img{max-width:100%;border-radius:6px;margin:6px 0}

/* 输入 */
footer{padding:12px 16px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:var(--bg)}
footer textarea{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-family:var(--font);font-size:14px;resize:none;outline:none;min-height:40px;max-height:100px;transition:border-color .25s}
footer textarea:focus{border-color:var(--accent)}
footer button{background:var(--accent);border:none;border-radius:var(--radius);padding:10px 18px;color:#fff;font-size:14px;cursor:pointer;height:40px;transition:all .2s}
footer button:hover:not(:disabled){background:#7da07d;transform:translateY(-1px)}
footer button:active:not(:disabled){transform:translateY(0)}
footer button:disabled{opacity:.4;cursor:default}

footer #attachBtn{background:var(--accent);border:none;width:36px;padding:0}
footer #attachBtn:hover:not(:disabled){background:#7da07d;transform:translateY(-1px)}

/* 文件预览区 */
#filePreview{display:none;padding:8px 16px;background:var(--surface);border-top:1px solid var(--border);flex-wrap:wrap;gap:6px}
#filePreview.show{display:flex}
.file-chip{display:inline-flex;align-items:center;gap:4px;background:var(--dim-bg);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--text);max-width:200px}
.file-chip .fname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-chip .fsize{color:var(--dim);font-size:10px;flex-shrink:0}
.file-chip .fremove{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;flex-shrink:0}
.file-chip .fremove:hover{color:#c66}

/* 登录 */
#login{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px 36px;width:360px;max-width:90vw;text-align:center;animation:fadeSlideIn .5s ease-out}
.login-box .logo{font-size:42px;margin-bottom:8px;transition:transform .3s}
.login-box .logo:hover{transform:rotate(15deg) scale(1.1)}
.login-box h2{font-size:20px;font-weight:500}
.login-box .sub{font-size:12px;color:var(--dim);margin-bottom:24px}
.login-box input{display:block;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:14px;outline:none;font-family:var(--font);transition:border-color .25s}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;margin-top:10px;background:var(--accent);border:none;border-radius:10px;padding:12px;color:#fff;font-size:14px;cursor:pointer;transition:all .2s}
.login-box button:hover{background:#7da07d;transform:translateY(-1px)}
.login-box button:active{transform:translateY(0)}
.login-box .err{color:#c66;font-size:13px;margin-top:10px;display:none;animation:fadeSlideIn .25s}
.login-box .hint{font-size:12px;color:var(--dim);margin-top:12px}

/* 遮罩 */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:10;display:none;opacity:0;transition:opacity .3s}
#overlay.show{display:block;opacity:1}

@media(max-width:720px){
  #sidebar{position:fixed;top:0;left:0;bottom:0;z-index:30;box-shadow:4px 0 20px rgba(0,0,0,.5);width:min(var(--sbw),85vw);transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
  #sidebar:not(.collapsed){transform:translateX(0)}
  .session-new{flex-wrap:wrap}
  .session-new select{max-width:100px;min-width:0}
  .session-new input{min-width:80px}
  .menu-btn{padding:6px 10px !important;font-size:18px !important}
}

})();

// ─── Markdown 渲染 ───
function renderMarkdown(text){
  if(!text)return '';
  try{
    if(typeof marked!=='undefined'&&marked.parse){
      var html=marked.parse(text,{breaks:true,gfm:true});
      // 基础安全处理：移除 script 标签和事件处理器
      html=html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi,'');
      html=html.replace(/\son\w+\s*=\s*(?:"[^"]*"|'[^']*'|\S+)/gi,'');
      return html;
    }
  }catch(e){}
  // fallback: 手动渲染图片 markdown，其余转义
  var safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 把 ![](url) 转成 <img>
  safe=safe.replace(/!\[(.*?)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%;border-radius:6px;margin:6px 0">');
  return safe;
}

function setMsgContent(el,text){
  el.innerHTML=renderMarkdown(text);
  // 代码语法高亮
  try{
    if(typeof hljs!=='undefined'&&hljs.highlightElement){
      var blocks=el.querySelectorAll('pre code');
      for(var i=0;i<blocks.length;i++){
        try{hljs.highlightElement(blocks[i]);}catch(e2){}
      }
    }
  }catch(e){console.log('hljs error:',e)}
  // 代码块装饰：语言标签 + 复制按钮
  decorateCodeBlocks(el);
}

// ─── 文件下载按钮 ───
function renderFileButtons(container,files){
  if(!files||!files.length)return;
  for(var fi=0;fi<files.length;fi++){
    var f=files[fi];
    var fn=f.filename||f.name||'file';
    var url=f.url||'';
    if(!url)continue;
    var href=url.indexOf('://')>=0?url:(window.location.origin+url);
    var div=document.createElement('div');
    div.style.cssText='display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--accent);border-radius:6px;padding:6px 10px;margin-top:6px;font-size:12px';
    div.innerHTML='<span style="font-size:14px;margin-right:4px">📄</span><span style="font-size:12px">'+fn+'</span><a href="'+href+'" target="_blank" style="background:var(--accent);color:#fff;border:none;border-radius:4px;padding:2px 10px;font-size:12px;cursor:pointer;text-decoration:none;margin-left:8px" download>\u2b07 \u4e0b\u8f7d</a>';
    container.appendChild(div);
  }
}

// ─── 代码块装饰（语言标签 + 复制按钮） ───
function decorateCodeBlocks(el){
  var pres=el.querySelectorAll('pre');
  for(var i=0;i<pres.length;i++){
    var pre=pres[i];
    // 已装饰的跳过
    if(pre.previousElementSibling&&pre.previousElementSibling.classList.contains('code-header')) continue;
    var code=pre.querySelector('code');
    if(!code) continue;
    // 提取语言
    var lang='code';
    for(var j=0;j<code.classList.length;j++){
      var cls=code.classList[j];
      if(cls.indexOf('language-')===0){lang=cls.slice(9);break}
    }
    // 如果 marked 没标注语言，用 hljs 自动检测（支持 190+ 语言）
    if(lang==='code'&&typeof hljs!=='undefined'&&hljs.highlightAuto){
      try{
        var result=hljs.highlightAuto(code.textContent);
        if(result.language) lang=result.language;
      }catch(e){}
    }
    // 创建头部
    var header=document.createElement('div');
    header.className='code-header';
    var langSpan=document.createElement('span');
    langSpan.className='code-lang';
    langSpan.textContent=lang;
    header.appendChild(langSpan);
    var codeText=code.textContent;
    var copyBtn=document.createElement('button');
    copyBtn.className='code-copy';
    copyBtn.textContent=_t('copy');
    copyBtn.onclick=function(txt,btn){
      return function(){
        // 直接用 textarea 方案，兼容 HTTP 和所有浏览器
        var ta=document.createElement('textarea');
        ta.value=txt;
        ta.style.cssText='position:fixed;left:-9999px;top:0;opacity:0';
        document.body.appendChild(ta);
        ta.focus();ta.select();
        var ok=false;
        try{ok=document.execCommand('copy')}catch(e){}
        document.body.removeChild(ta);
        if(ok){
          btn.textContent=_t('copied');btn.classList.add('copied');
          setTimeout(function(){btn.textContent=_t('copy');btn.classList.remove('copied')},2000);
        } else if(navigator.clipboard&&navigator.clipboard.writeText){
          navigator.clipboard.writeText(txt).then(function(){
            btn.textContent=_t('copied');btn.classList.add('copied');
            setTimeout(function(){btn.textContent=_t('copy');btn.classList.remove('copied')},2000);
          }).catch(function(){alert('复制失败，请手动选择复制')});
        } else {alert('复制失败，请手动选择复制')}
      };
    }(codeText,copyBtn);
    header.appendChild(copyBtn);
    pre.parentNode.insertBefore(header,pre);
  }
}

function loadQuote(){
  var x=new XMLHttpRequest();
  x.open('GET',HOST+'/api/quote');
  x.onload=function(){
    if(x.status===200){
      var d=JSON.parse(x.responseText);
      if(d.quote) typeQuote(d.quote);
    }
  };
  x.send();
}

function typeQuote(text){
  var el=$('quoteLine');
  el.textContent='';
  el.style.display='block';
  el.style.minHeight='40px';
  el.style.fontSize='13px';
  el.style.color='var(--accent)';
  el.style.fontStyle='italic';
  el.style.opacity='0';
  el.style.transition='opacity .5s';

  // 先淡入
  setTimeout(function(){
    el.style.opacity='1';

    // 逐字输出
    var idx=0;
    var ti=setInterval(function(){
      if(idx<text.length){
        el.textContent=text.slice(0,idx+1);
        var c=text.charAt(idx);
        // 暂停一下对标点
        var delay=(c==='，'||c==='。'||c==='！'||c==='？'||c==='——')?120:30;
        idx++;
        if(ti) clearInterval(ti);
        ti=setInterval(arguments.callee,delay);
      }else{
        clearInterval(ti);
        el.style.cursor='none';
        // 末尾闪烁光标
        el.textContent=text+'|';
        var blink=setInterval(function(){
          if(el.textContent.endsWith('|')) el.textContent=el.textContent.slice(0,-1);
          else el.textContent=text+'|';
        },500);
      }
    },30);
  },200);
}

function updateSessionLabel(){
  // 优先显示：标题 > 人格名 > 会话ID > 默认文字
  var label=SESSION_LABEL;
  if(!label){
    var sel=$('sessList').querySelector('[data-sid="'+SESSION_ID+'"]');
    var pf=sel?sel.getAttribute('data-profile')||'':'';
    label=pf||SESSION_ID.slice(0,16)||_t('defaultSession');
  }
  // 如果文字没变，不重新打字
  var el=$('curSession');
  if(el.getAttribute('data-target')===label)return;
  el.setAttribute('data-target',label);
  el.textContent='';
  // 逐字效果，比聊天快一点（40ms/字）
  var idx=0;
  if(window._sessLabelTimer)clearInterval(window._sessLabelTimer);
  window._sessLabelTimer=setInterval(function(){
    idx++;
    var txt=label.slice(0,idx);
    // 把光标放在已输入文字的末尾
    el.innerHTML=txt+'<span style="opacity:0.5">|</span>';
    if(idx>=label.length){
      clearInterval(window._sessLabelTimer);
      window._sessLabelTimer=null;
      el.innerHTML=txt;
    }
  },40);
}

function loadSessionMessages(sid){
  if(sid){
    var x=new XMLHttpRequest();
    x.open('GET',HOST+'/sessions/'+encodeURIComponent(sid)+'/messages');
    x.setRequestHeader('Authorization','Bearer '+TOKEN);
    x.onload=function(){
      if(x.status===200){
        var d=JSON.parse(x.responseText);
        var allMsgs=d.messages||[];
        // 只有后端有数据时才清空 DOM（防止后端还没存好消息时把界面清空）
        if(allMsgs.length===0)return;
        chat.innerHTML='';
        var hasProcessing=false;
        var lastUserRole=false;
        for(var i=0;i<allMsgs.length;i++){
          var m=allMsgs[i];
          if(m.role==='system'){
            if(m.content==='[PROCESSING]')hasProcessing=true;
            continue;
          }
          var el=document.createElement('div');
          el.className='msg '+(m.role==='user'?'me':'bot');
          setMsgContent(el,m.content);
          chat.appendChild(el);
          if(m.role==='user')lastUserRole=true; else lastUserRole=false;
          // \u4ECE\u540E\u7AEF files \u6216\u6D88\u606F\u6587\u672C\u4E2D\u89E3\u6790\u6587\u4EF6\u94FE\u63A5
          var msgFiles=m.files||[];
          if(!msgFiles.length&&m.content){
            var linkRe=/\[\u6587\u4EF6:\s*([^\]]+)\]\(([^)]+)\)/g;
            var lm;
            while((lm=linkRe.exec(m.content))!==null){
              msgFiles.push({name:lm[1],url:lm[2]});
            }
          }
          if(msgFiles.length>0){
            for(var fi=0;fi<msgFiles.length;fi++){
              var f=msgFiles[fi],fn=f.filename||f.name||'file',url=f.url||'';
              if(!url)continue;
              var href=url.indexOf('://')>=0?url:(window.location.origin+url);
              var bd=document.createElement('div');
              bd.style.cssText='display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--accent);border-radius:6px;padding:6px 10px;margin-top:6px;font-size:12px';
              var ic=document.createElement('span');ic.textContent='\uD83D\uDCC4';ic.style.fontSize='14px';bd.appendChild(ic);
              var ns=document.createElement('span');ns.textContent=fn;ns.style.fontSize='12px';bd.appendChild(ns);
              var al=document.createElement('a');al.href=href;al.target='_blank';al.download='';al.textContent='\u2B07 \u4E0B\u8F7D';
              al.style.cssText='background:var(--accent);color:#fff;border:none;border-radius:4px;padding:2px 10px;font-size:12px;cursor:pointer;text-decoration:none;margin-left:8px';
              bd.appendChild(al);el.appendChild(bd);
            }
          }
        }

function addMsg(text,role,t,files){

  var msgs=loadMsgs();msgs.push({text:text,role:role,files:fileList});saveMsgs(msgs);
  var typing=document.querySelector('.msg.bot.typing');
  if(typing)typing.remove();
  var d=document.createElement('div');
  d.className='msg '+(role==='user'?'me':'bot');
  chat.appendChild(d);
  if(t&&role==='bot'){
    // 打字效果：逐字渲染 Markdown
    setMsgContent(d,'');
    var idx=0,lastIdx=0,ti=setInterval(function(){
      if(idx<text.length){
        idx++;
        if(idx-lastIdx>=3||idx>=text.length){
          setMsgContent(d,text.slice(0,idx));
          lastIdx=idx;
          chat.scrollTop=chat.scrollHeight;
        }
      } else {
        clearInterval(ti);
        setMsgContent(d,text);
        if(fileList.length>0) renderFileButtons(d,fileList);

function escapeHtml(s){

  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function showToolCall(name, args, status, errMsg){

function _doSend(text,files){
  input.value='';input.style.height='auto';
  _recovered=false;
  addMsg(text,'user',false,files||[]);showTyping();LOADING=true;sendBtn.disabled=true;
  _activeReqId='';
  _lastProgressTs=Date.now();
  if(_activeChatXhr){try{_activeChatXhr.abort()}catch(e){}}
  _activeChatXhr=null;
  // 流式 ndjson 请求
  var _lastPos=0;
  var x=new XMLHttpRequest();
  _activeChatXhr=x;
  x.open('POST',HOST+'/chat');
  x.timeout=300000;
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onreadystatechange=function(){
    if(x.status===401&&x.readyState===4){LS.removeItem('hedera_token');TOKEN='';showLogin();LOADING=false;sendBtn.disabled=false;return}
    // 获取请求 ID 用于轮询
    if(x.readyState===2){
      _activeReqId=x.getResponseHeader('X-Request-Id')||'';
      if(_activeReqId)setTimeout(_pollProgress,600);
    }
    // 实时工具调用（增量解析，行可能不完整但工具事件通常在独立行）
    if(x.readyState===3){
      _lastProgressTs=Date.now();
      var raw=x.responseText||'';
      var newPart=raw.slice(_lastPos);
      _lastPos=raw.length;
      if(newPart){
        var lines=newPart.split('\n');
        for(var i=0;i<lines.length;i++){
          var line=lines[i].trim();
          if(!line)continue;
          try{
            var ev=JSON.parse(line);
            if(ev.type==='tool')showToolCall(ev.name, ev.args, ev.status, ev.error);
          }catch(e2){}
        }
      }
    }
    // 请求完成：完整解析所有行（确保跨 chunk 的行也能处理）
    if(x.readyState===4){
      _activeReqId='';
      if(_activeChatXhr===x)_activeChatXhr=null;
      if(x.status===401){LS.removeItem('hedera_token');TOKEN='';showLogin();LOADING=false;sendBtn.disabled=false;return}
      var raw=x.responseText||'';
      var lines=raw.split('\n');
      var foundDone=false;
      for(var i=0;i<lines.length;i++){
        var line=lines[i].trim();
        if(!line)continue;
        try{
          var ev=JSON.parse(line);
          if(ev.type==='tool'){
            showToolCall(ev.name, ev.args, ev.status, ev.error);
          }else if(ev.type==='result'){
            foundDone=true;
            hideTyping();removeToolIndicator();
            LOADING=false;sendBtn.disabled=false;
            var rt=ev.response||'';
            if(rt)addMsg(rt,'bot',true,ev.files||[]);
            else addMsg(ev.error||'已处理','bot');
            if(ev.session_id&&ev.session_id!==SESSION_ID){
              SESSION_ID=ev.session_id;LS.setItem('hedera_session_id',SESSION_ID);
            }
            loadSessions();
            if(!SESSION_LABEL&&text){SESSION_LABEL=text.slice(0,40);LS.setItem('hedera_session_label',SESSION_LABEL);updateSessionLabel();}
            input.focus();
          }else if(ev.type==='error'){
            foundDone=true;
            hideTyping();removeToolIndicator();
            LOADING=false;sendBtn.disabled=false;
            addMsg('错误: '+(ev.error||'未知错误'),'bot');input.focus();
          }
        }catch(e2){}
      }
      if(!foundDone&&LOADING){
        // status===0 是网络错误，交给 onerror 处理恢复（轮询后端）
        if(x.status!==0){
          hideTyping();removeToolIndicator();
          LOADING=false;sendBtn.disabled=false;
          try{var d=JSON.parse(raw);if(d.response)addMsg(d.response,'bot',true,d.files);else addMsg('连接失败，刷新重试','bot');
          }catch(e){addMsg('连接失败，刷新重试','bot')}
          input.focus();
        }
      }
    }
  };
  x.ontimeout=function(){
    if(_activeChatXhr===x)_activeChatXhr=null;
    if(_recovered)return;
    // 超时 → 检查后端是否已完成，未完成则持续轮询
    var rc=new XMLHttpRequest();
    rc.open('GET',HOST+'/sessions/'+encodeURIComponent(SESSION_ID||'_default')+'/messages');
    rc.setRequestHeader('Authorization','Bearer '+TOKEN);
    rc.onload=function(){
      if(_recovered)return;
      try{
        var d=JSON.parse(rc.responseText);
        var msgs=d.messages||[];
        if(msgs.length>=2){
          var lastMsg=msgs[msgs.length-1];
          if(lastMsg.role==='assistant'){
            _recovered=true;
            hideTyping();removeToolIndicator();
            LOADING=false;sendBtn.disabled=false;
            addMsg(lastMsg.content,'bot',true,lastMsg.files||[]);
            loadSessions();input.focus();
            return;
          }
        }
      }catch(e){}
      // 后端还在处理 → 继续轮询而不是放弃
      _pollForResponse(SESSION_ID||'_default',0);
    };
    rc.onerror=function(){
      if(_recovered)return;
      // 网络也断了 → 继续轮询
      _pollForResponse(SESSION_ID||'_default',0);
    };
    rc.send();
  };
  x.onerror=function(){
    if(_activeChatXhr===x)_activeChatXhr=null;
    if(_recovered)return;
    // 连接失败 → 检查后端是否已完成，未完成则持续轮询
    var rc=new XMLHttpRequest();
    rc.open('GET',HOST+'/sessions/'+encodeURIComponent(SESSION_ID||'_default')+'/messages');
    rc.setRequestHeader('Authorization','Bearer '+TOKEN);
    rc.onload=function(){
      if(_recovered)return;
      try{
        var d=JSON.parse(rc.responseText);
        var msgs=d.messages||[];
        if(msgs.length>=2){
          var lastMsg=msgs[msgs.length-1];
          if(lastMsg.role==='assistant'){
            _recovered=true;
            hideTyping();removeToolIndicator();
            LOADING=false;sendBtn.disabled=false;
            addMsg(lastMsg.content,'bot',true,lastMsg.files||[]);
            loadSessions();input.focus();
            return;
          }
        }
      }catch(e){}
      // 后端还在处理 → 继续轮询而不是放弃
      _pollForResponse(SESSION_ID||'_default',0);
    };
    rc.onerror=function(){
      if(_recovered)return;
      // 网络也断了 → 继续轮询
      _pollForResponse(SESSION_ID||'_default',0);
    };
    rc.send();
  };
  x.send(JSON.stringify({message:text,session_id:SESSION_ID||null}));
}

// ─── 后台标签恢复：页面回到前台时检查是否有遗漏的响应 ──
var _recovered=false;
var _activeReqId='';
var _lastProgressTs=0;   // 最后一次收到进度/流数据的时间戳
var _activeChatXhr=null;  // 当前聊天 XHR 引用，用于恢复时 abort
function _pollProgress(){
  if(!LOADING||!_activeReqId)return;
  var p=new XMLHttpRequest();
  p.open('GET',HOST+'/chat/progress?req='+_activeReqId);
  p.setRequestHeader('Authorization','Bearer '+TOKEN);
  p.onload=function(){try{
    var d=JSON.parse(p.responseText);
    if(d&&d.name){showToolCall(d.name,d.args,d.status,d.error);_lastProgressTs=Date.now()}
  }catch(e){};
  if(LOADING)setTimeout(_pollProgress,600)};
  p.send();
}
function _pollForResponse(sid,attempt){
  if(attempt>150){hideTyping();LOADING=false;sendBtn.disabled=false;addMsg('等待超时，请刷新页面重试。','bot');return;}
  setTimeout(function(){
    var px=new XMLHttpRequest();
    px.open('GET',HOST+'/sessions/'+encodeURIComponent(sid)+'/messages');
    px.setRequestHeader('Authorization','Bearer '+TOKEN);
    px.onload=function(){
      try{
        var d=JSON.parse(px.responseText);
        var allMsgs=d.messages||[];
        var hasProcessing=false;
        var hasAssistantAfterUser=false;
        var lastAssistant=null;
        // 检查是否有新的工具调用事件
        for(var i=0;i<allMsgs.length;i++){
          var m=allMsgs[i];
          if(m.role==='system'&&m.content==='[PROCESSING]')hasProcessing=true;
          if(m.role==='assistant')lastAssistant=m;
        }
        // 判断是否有用户消息之后的助手回复
        for(var i=allMsgs.length-1;i>=0;i--){
          if(allMsgs[i].role==='user')break;
          if(allMsgs[i].role==='assistant'){hasAssistantAfterUser=true;lastAssistant=allMsgs[i];break;}
        }
        if(hasAssistantAfterUser&&!_recovered){
          _recovered=true;
          removeToolIndicator();
          hideTyping();LOADING=false;sendBtn.disabled=false;
          addMsg(lastAssistant.content,'bot',true,lastAssistant.files||[]);
          loadSessions();input.focus();
        }else if(!hasProcessing&&!_recovered){
          // 后端空闲且没有回复 → 处理中断
          _recovered=true;
          hideTyping();LOADING=false;sendBtn.disabled=false;
          addMsg('处理中断，请重新发送消息。','bot');
          input.focus();
        }else{
          _pollForResponse(sid,attempt+1);
        }
      }catch(e){_pollForResponse(sid,attempt+1)}
    };
    px.onerror=function(){_pollForResponse(sid,attempt+1)};
    px.send();
  },2000);
}

// ─── 从消息列表恢复响应（共用逻辑）───
function _tryRecoverFromMessages(){
  if(!LOADING||_recovered)return;
  var sid=SESSION_ID||'_default';
  var checkX=new XMLHttpRequest();
  checkX.open('GET',HOST+'/sessions/'+encodeURIComponent(sid)+'/messages');
  checkX.setRequestHeader('Authorization','Bearer '+TOKEN);
  checkX.onload=function(){
    if(checkX.status!==200||_recovered)return;
    try{
      var d=JSON.parse(checkX.responseText);
      var allMsgs=d.messages||[];
      var hasProcessing=false;
      var hasAssistantAfterUser=false;
      var lastAssistant=null;
      // 先找 PROCESSING 标记
      for(var i=0;i<allMsgs.length;i++){
        if(allMsgs[i].role==='system'&&allMsgs[i].content==='[PROCESSING]')hasProcessing=true;
      }
      // 从末尾往前找，跳过非 user 消息，找到第一个 assistant 即为用户消息之后的回复
      for(var i=allMsgs.length-1;i>=0;i--){
        if(allMsgs[i].role==='user')break;
        if(allMsgs[i].role==='assistant'){hasAssistantAfterUser=true;lastAssistant=allMsgs[i];break;}
      }
      if(hasAssistantAfterUser&&!_recovered){
        _recovered=true;
        if(_activeChatXhr){try{_activeChatXhr.abort()}catch(e){}_activeChatXhr=null}
        _activeReqId='';
        removeToolIndicator();
        hideTyping();LOADING=false;sendBtn.disabled=false;
        addMsg(lastAssistant.content,'bot',true,lastAssistant.files||[]);
        loadSessions();input.focus();
      }else if(!hasProcessing&&!_recovered){
        // 后端没有 PROCESSING 标记也没有新回复 → 可能还在初始化，继续轮询
        _pollForResponse(sid,0);
      }
    }catch(e){}
  };
  checkX.onerror=function(){
    // 网络也断了 → 不放弃，等 watchdog 或 visibilitychange 重试
  };
  checkX.send();
}
document.addEventListener('visibilitychange',function(){
  if(document.hidden||!LOADING||_recovered)return;
  // 恢复进度轮询
  if(_activeReqId)setTimeout(_pollProgress,200);
  // 如果距离上次进度超过 30s，abort 旧 XHR 并尝试恢复
  if(_lastProgressTs&&(Date.now()-_lastProgressTs>30000)){
    if(_activeChatXhr){try{_activeChatXhr.abort()}catch(e){}_activeChatXhr=null}
  }
  _tryRecoverFromMessages();
});
// ─── 看门狗：每 8 秒检查，后台节流时也能兜底 ───
setInterval(function(){
  if(!LOADING||_recovered)return;
  // 超过 45 秒无进度 → 尝试恢复
  if(_lastProgressTs&&(Date.now()-_lastProgressTs>45000)){
    if(_activeChatXhr){try{_activeChatXhr.abort()}catch(e){}_activeChatXhr=null}
    _tryRecoverFromMessages();
  }
},8000);

var _ttsEnabled=false;
var _ttsApiMode=false;  // 启动后从 config 读取
var _ttsUtterance=null;
var _ttsAudioEl=null;

// 从 config 加载 TTS API 模式
function loadTtsMode(){
  var cb=$('cfgTtsToggle');
  if(!cb)return;
  cb.onchange=function(){
    _ttsEnabled=cb.checked;
    localStorage.setItem('hedera_tts',_ttsEnabled?'1':'0');
    if(!_ttsEnabled){
      if(window.speechSynthesis)window.speechSynthesis.cancel();
      if(_ttsAudioEl){_ttsAudioEl.pause();_ttsAudioEl=null}
    }
  };
  var saved=localStorage.getItem('hedera_tts');
  if(saved==='1'){cb.checked=true;_ttsEnabled=true}
  // Load API mode from config
  var x=new XMLHttpRequest();
  x.open('GET',HOST+'/config');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){try{
    var d=JSON.parse(x.responseText);
    _ttsApiMode=!!(d.tts&&d.tts.enabled&&d.tts.api_key_masked&&d.tts.api_key_masked!=='未配置');
  }catch(e){}};
  x.send();
}
// (loadTtsMode is also called in initChat)




function speakText(text){
  if(!_ttsEnabled||!text)return;
  // 去掉 markdown 图片、链接、代码块、粗体等，只留纯文字
  // 去掉 markdown 图片、链接、代码块；去掉所有 HTTP 路径（防止 TTS 读链接）
  var cleanText=text.replace(/!\[.*?\]\(.*?\)/g,'').replace(/\[.*?\]\(.*?\)/g,'').replace(/`{1,3}[^`]*`{1,3}/g,'').replace(/https?:\/\/[^\s]+/g,'').replace(/[*_~>`#|\-]+/g,' ').replace(/\s+/g,' ').trim().substring(0,2000);

  if(_ttsApiMode){
    // API 模式：先用浏览器原生语音立即播放，API 音频准备好后切换
    // 1. 立即用浏览器 TTS（低延迟）
    window.speechSynthesis.cancel();
    _ttsUtterance=new SpeechSynthesisUtterance(cleanText.substring(0,500));
    _ttsUtterance.lang='zh-CN';_ttsUtterance.rate=1.2;
    var voices=window.speechSynthesis.getVoices();
    for(var i=0;i<voices.length;i++){if(voices[i].lang.startsWith('zh')){_ttsUtterance.voice=voices[i];break}}
    window.speechSynthesis.speak(_ttsUtterance);
    // 2. 同时请求 API 高质量音频
    if(_ttsAudioEl){_ttsAudioEl.pause();_ttsAudioEl=null}
    var x=new XMLHttpRequest();
    x.open('POST',HOST+'/api/tts');
    x.setRequestHeader('Content-Type','application/json');
    x.setRequestHeader('Authorization','Bearer '+TOKEN);
    x.onload=function(){try{
      var d=JSON.parse(x.responseText);
      if(d.status==='ok'&&d.url){
        // API 音频就绪 → 停掉浏览器 TTS，播放高质量音频
        window.speechSynthesis.cancel();
        _ttsAudioEl=document.createElement('audio');
        _ttsAudioEl.src=HOST+d.url;
        _ttsAudioEl.autoplay=true;
        _ttsAudioEl.onended=function(){_ttsAudioEl=null};
        document.body.appendChild(_ttsAudioEl);
        _ttsAudioEl.play();
      }
    }catch(e){}};
    x.send(JSON.stringify({text:cleanText}));
  }else{
    // 浏览器原生模式
    window.speechSynthesis.cancel();
    _ttsUtterance=new SpeechSynthesisUtterance(cleanText);
    _ttsUtterance.lang='zh-CN';
    _ttsUtterance.rate=1.0;
    _ttsUtterance.pitch=1.0;
    var voices=window.speechSynthesis.getVoices();
    for(var i=0;i<voices.length;i++){
      if(voices[i].lang.startsWith('zh')){_ttsUtterance.voice=voices[i];break}
    }
    window.speechSynthesis.speak(_ttsUtterance);
  }
}

// ─── 文件上传（多文件 + 附加消息）───
var _pendingFiles=[];  // {file: File, name: string, size: string}

if($('attachBtn'))$('attachBtn').onclick=function(){
  var fi=document.getElementById('fileInput');
  if(!fi){
    fi=document.createElement('input');
    fi.type='file';fi.id='fileInput';fi.style='display:none';fi.multiple=true;
    document.body.appendChild(fi);
    fi.onchange=function(){
      var files=Array.from(this.files);
      if(!files.length)return;
      for(var i=0;i<files.length;i++){
        var f=files[i];
        // 检查是否已添加同名文件
        var exists=false;
        for(var j=0;j<_pendingFiles.length;j++){if(_pendingFiles[j].name===f.name&&_pendingFiles[j].size===f.size){exists=true;break}}
        if(exists)continue;
        var sizeStr=f.size<1024?f.size+'B':f.size<1048576?(f.size/1024).toFixed(1)+'KB':(f.size/1048576).toFixed(1)+'MB';
        _pendingFiles.push({file:f,name:f.name,size:sizeStr});
      }
      _renderFilePreview();
      this.value='';
    };
  }
  fi.click();
};

function _renderFilePreview(){
  var container=$('filePreview');
  if(!container)return;
  if(!_pendingFiles.length){container.classList.remove('show');container.innerHTML='';return}
  container.classList.add('show');
  var html='';
  for(var i=0;i<_pendingFiles.length;i++){
    html+='<div class="file-chip" data-idx="'+i+'">'+
      '<span class="fname">'+_escHtml(_pendingFiles[i].name)+'</span>'+
      '<span class="fsize">'+_pendingFiles[i].size+'</span>'+
      '<button class="fremove" onclick="_removeFile('+i+')">&times;</button></div>';
  }
  container.innerHTML=html;
}

function _removeFile(idx){
  _pendingFiles.splice(idx,1);
  _renderFilePreview();
}

function _uploadFilesAndSend(text){
  if(!_pendingFiles.length){
    // 没有文件，直接发消息
    _doSend(text);
    return;
  }
  // 有文件：先上传所有文件，再发消息
  showTyping();LOADING=true;sendBtn.disabled=true;
  var uploadedFiles=[];
  var remaining=_pendingFiles.length;

  for(var i=0;i<_pendingFiles.length;i++){
    (function(idx){
      var pf=_pendingFiles[idx];
      var fd=new FormData();
      fd.append('file',pf.file);
      fd.append('session_id',SESSION_ID||'');
      var x=new XMLHttpRequest();
      x.open('POST',HOST+'/upload');
      x.setRequestHeader('Authorization','Bearer '+TOKEN);
      x.onload=function(){
        try{
          var d=JSON.parse(x.responseText);
          if(d.status==='ok'&&d.file)uploadedFiles.push(d.file);
        }catch(e){}
        remaining--;
        if(remaining<=0)_onAllUploaded(text,uploadedFiles);
      };
      x.onerror=function(){
        remaining--;
        if(remaining<=0)_onAllUploaded(text,uploadedFiles);
      };
      x.send(fd);
    })(i);
  }
}

function _onAllUploaded(text,uploadedFiles){
  _pendingFiles=[];
  _renderFilePreview();
  // 构建发送给后端的消息（包含文件引用）
  var msgParts=[];
  if(text)msgParts.push(text);
  for(var i=0;i<uploadedFiles.length;i++){
    msgParts.push('[文件: '+uploadedFiles[i].name+']('+uploadedFiles[i].url+')');
  }
  var fullMsg=msgParts.join('\n')||'(已上传文件)';
  // 用 _doSend 统一处理，传入文件列表用于显示下载按钮
  _doSend(fullMsg,uploadedFiles);
}

function loadSessions(){
  var x=new XMLHttpRequest();
  x.open('GET',HOST+'/sessions');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    if(x.status===401){TOKEN='';LS.removeItem('hedera_token');showLogin();return}
    if(x.status!==200){$('sessList').innerHTML='<div class="empty-hint">加载失败</div>';return}
    var d=JSON.parse(x.responseText);
    var sessions=(d.sessions||[]).filter(function(s){return s.session_id&&(s.message_count>0||s.session_id===SESSION_ID)});
    var html='';
    if(!sessions.length)html='<div class="empty-hint">'+_t('noSessions')+'</div>';
    else for(var i=0;i<sessions.length;i++){
      var s=sessions[i];
      var active=s.session_id===SESSION_ID;
      var pf=s.profile||'';
      var pname='冬青';
      if(pf.indexOf('茯苓')>=0)pname='茯苓';
      else if(pf.indexOf('冬青')>=0)pname='冬青';
      var label=s.title||pname||s.session_id.slice(0,24);
      var msgs=s.message_count||0;
      var last=(s.last_active||'').replace('2026-','');
      var slabel=s.title||'';
      html+='<div class="session-item'+(active?' active':'')+'" data-sid="'+s.session_id+'" data-title="'+slabel+'" data-profile="'+pname+'">';
      html+='<div class="sline"><span class="sname">'+label+'</span><span class="sbadge'+(active?' show':'')+'">当前</span><button class="sdel" data-del="'+s.session_id+'">&times;</button></div>';
      html+='<div class="smeta">'+msgs+' 条消息 <span style="color:var(--accent);font-size:10px">'+pname+'</span></div></div>';
    }
    $('sessList').innerHTML=html;
    // 绑定事件
    $('sessList').querySelectorAll('.session-item').forEach(function(el){
      el.addEventListener('click',function(e){
        if(e.target.closest('.sdel'))return;
        var sid=this.getAttribute('data-sid');
        if(sid===SESSION_ID){toggleSidebar(false);return}
        SESSION_ID=sid;
        // 从 data-title 恢复会话标题
        var sel=$('sessList').querySelector('[data-sid="'+sid+'"]');
        var stitle=sel?sel.getAttribute('data-title')||'':'';
        SESSION_LABEL=stitle;
        if(stitle){LS.setItem('hedera_session_label',stitle)}else{LS.removeItem('hedera_session_label')}
        LS.setItem('hedera_session_id',sid);
        updateSessionLabel();loadSessionMessages(sid);
        updateSessList();toggleSidebar(false);
        // 会话已选中，启用输入
        input.disabled=false;sendBtn.disabled=false;
        if($('attachBtn'))$('attachBtn').disabled=false;
        input.focus();
        // 从会话列表中找到该会话的人格名
        var sels=$('sessList').querySelector('[data-sid="'+sid+'"]');
        if(sels){var pf=sels.getAttribute('data-profile');if(pf)CURRENT_PROFILE_NAME=pf;updateEmptyText()}
      });
    });
    $('sessList').querySelectorAll('.sdel').forEach(function(btn){
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        var sid=this.getAttribute('data-del');
        if(!confirm(_t('deleteSess')))return;
        var chatReq=new XMLHttpRequest();
        chatReq.open('DELETE',HOST+'/sessions/'+encodeURIComponent(sid));
        chatReq.setRequestHeader('Authorization','Bearer '+TOKEN);
        chatReq.onload=function(){
          if(chatReq.status===200){
            if(SESSION_ID===sid){SESSION_ID='';SESSION_LABEL='';LS.removeItem('hedera_session_id');LS.removeItem('hedera_session_label');updateSessionLabel();loadSessionMessages('')}
            loadSessions();
            toggleSidebar(false);
          }
        };
        chatReq.send();
      });
    });
  };
  x.onerror=function(){$('sessList').innerHTML='<div class="empty-hint">'+_t('networkError')+'</div>'};
  x.send();
}

function loadReflectionData(){

    if(x.status!==200){$('reflectionContent').innerHTML='<div class="empty-hint">加载失败</div>';return}

      if(!logs.length)html='<div class="empty-hint">暂无反思</div>';
      else for(var i=logs.length-1;i>=0;i--){
        var l=logs[i];
        var time=l.split('【')[1]?l.split('【')[1].split('】')[0]||'':'';
        var content=l.replace('【'+time+'】','');
        html+='<div class="ref-item"><div class="rtime">'+time+'</div><div class="rcontent">'+content.slice(0,200)+'</div></div>';
      }
    }else if(tab==='experience'){
      var exps=d.experiences||[];
      if(!exps.length)html='<div class="empty-hint">暂无蒸馏</div>';
      else for(var i=exps.length-1;i>=0;i--){
        var e=exps[i];

        html+='<div class="ref-item"><div class="rtime">'+e.time+'</div><div class="rcontent">'+rules.slice(0,200)+'</div></div>';
      }
    }else if(tab==='rules'){
      var rules=d.rules||[];
      if(!rules.length)html='<div class="empty-hint">暂无准则</div>';
      else for(var i=0;i<rules.length;i++){
        html+='<div class="ref-item"><div class="rcontent">'+(i+1)+'. '+rules[i]+'</div></div>';
      }
    }

}

// 自动保存：输入框变化 → 防抖 300ms → 保存 + 重载 + 闪 ✓
var _autoSaveTimer=null;
function _scheduleAutoSave(){
  if(_autoSaveTimer)clearTimeout(_autoSaveTimer);
  _autoSaveTimer=setTimeout(function(){_autoSaveTimer=null;_doAutoSave()},300);
}
function _cancelAutoSave(){if(_autoSaveTimer){clearTimeout(_autoSaveTimer);_autoSaveTimer=null}}

function _immediateSave(){
  if(_autoSaveTimer){clearTimeout(_autoSaveTimer);_autoSaveTimer=null}

// 收集当前 Tab 有变化的字段
function _collectConfigBody(){
  var body={};
  var mk=$('cfgModelKey').value.trim();if(mk)body.model_api_key=mk;
  var mn=$('cfgModelName').value.trim();if(mn)body.model_name=mn;
  var me=$('cfgModelEndpoint').value.trim();if(me)body.model_endpoint=me;
  var tk=$('cfgTavilyKey').value.trim();if(tk)body.search_keys={tavily:tk};
  var im=$('cfgImgModel').value.trim();if(im)body.image_gen_model=im;
  var ie=$('cfgImgEndpoint').value.trim();if(ie)body.image_gen_endpoint=ie;
  var ik=$('cfgImgKey').value.trim();if(ik)body.image_gen_key=ik;
  var tm=$('cfgTtsModel').value.trim();if(tm)body.tts_model=tm;
  var tv=$('cfgTtsVoice').value.trim();if(tv)body.tts_voice=tv;
  var te=$('cfgTtsEndpoint').value.trim();if(te)body.tts_endpoint=te;
  var tsk=$('cfgTtsKey').value.trim();if(tsk)body.tts_key=tsk;
  return body;
}

function _doAutoSave(){
  var body=_collectConfigBody();
  if(!Object.keys(body).length)return;
  var x=new XMLHttpRequest();
  x.open('POST',HOST+'/config');
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    if(x.status===200){
      // 重载
      var r=new XMLHttpRequest();r.open('POST',HOST+'/config/reload');r.setRequestHeader('Authorization','Bearer '+TOKEN);r.send();
      // 闪 ✓ 指示器
      _flashSaveIndicators();
      setStatus('✓ 已保存并生效','ok');
      setTimeout(function(){setStatus('')},3000);
    }
  };
  x.send(JSON.stringify(body));
}

function _flashSaveIndicators(){
  var ids=['siModelKey','siImgKey','siTtsKey','siTavilyKey'];
  for(var i=0;i<ids.length;i++){var el=$(ids[i]);if(el){el.classList.add('show');(function(e){setTimeout(function(){e.classList.remove('show')},2000)})(el)}}
}

// 绑定所有输入框的自动保存
// _userTouched 防止浏览器自动填充触发保存
var _userTouched={};
(function(){
  var inputs=['cfgModelKey','cfgModelName','cfgModelEndpoint','cfgTavilyKey','cfgImgModel','cfgImgEndpoint','cfgImgKey','cfgTtsModel','cfgTtsVoice','cfgTtsEndpoint','cfgTtsKey'];
  for(var i=0;i<inputs.length;i++){
    (function(el){
      if(!el)return;
      // 只在用户真正输入时标记
      el.addEventListener('keydown',function(){_userTouched[el.id]=true});
      el.addEventListener('paste',function(){_userTouched[el.id]=true;setTimeout(_immediateSave,50)});
      el.addEventListener('input',function(){
        if(!_userTouched[el.id])return; // 自动填充的不触发
        _scheduleAutoSave();
      });
      el.addEventListener('blur',function(){
        if(_userTouched[el.id])_immediateSave();
      });
      el.addEventListener('change',function(){
        if(_userTouched[el.id])_immediateSave();
      });
    })($(inputs[i]));
  }
})();
// F5/刷新前如果有待保存内容，阻止刷新 → 保存 → 刷新
window.addEventListener('keydown',function(e){
  if((e.key==='F5'||(e.ctrlKey&&e.key==='r'))&&_autoSaveTimer){
    e.preventDefault();
    clearTimeout(_autoSaveTimer);_autoSaveTimer=null;
    var body=_collectConfigBody();
    if(Object.keys(body).length){
      var x=new XMLHttpRequest();
      x.open('POST',HOST+'/config',false); // 同步请求
      x.setRequestHeader('Content-Type','application/json');
      x.setRequestHeader('Authorization','Bearer '+TOKEN);
      try{x.send(JSON.stringify(body))}catch(e2){}
      // 重载
      var r=new XMLHttpRequest();r.open('POST',HOST+'/config/reload',false);r.setRequestHeader('Authorization','Bearer '+TOKEN);try{r.send()}catch(e2){}
    }
    location.reload();
  }
});

// ─── 预设管理（后端 JSON 文件 + 卡片 UI）───
var PRESET_CATS={llm:{fields:['cfgModelName','cfgModelEndpoint','cfgModelKey'],nameKey:'cfgModelName'},
  img:{fields:['cfgImgModel','cfgImgEndpoint','cfgImgKey'],nameKey:'cfgImgModel'},
  tts:{fields:['cfgTtsModel','cfgTtsVoice','cfgTtsEndpoint','cfgTtsKey'],nameKey:'cfgTtsModel'}};
var _presetCache={llm:[],img:[],tts:[]};

function refreshPresetList(cat){
  var container=$('presetList'+cat.charAt(0).toUpperCase()+cat.slice(1));
  if(!container)return;
  var x=new XMLHttpRequest();
  x.open('GET',HOST+'/api/presets');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    try{
      var d=JSON.parse(x.responseText);
      var presets=(d.presets&&d.presets[cat])||[];
      _presetCache[cat]=presets;
      _renderPresetCards(cat,container,presets);
    }catch(e){}
  };
  x.send();
}

function _renderPresetCards(cat,container,presets){
  if(!presets.length){container.innerHTML='<div style="color:var(--dim);font-size:11px;padding:4px 0">暂无预设</div>';return}
  // 判断哪个预设当前生效（通过比对配置值）
  var activeIdx=-1;
  if(_currentConfig){
    for(var i=0;i<presets.length;i++){
      var p=presets[i],match=true;
      var fields=PRESET_CATS[cat].fields;
      // 简单匹配：预设的 nameKey 字段和当前配置一致
      var nameField=PRESET_CATS[cat].nameKey;
      var curVal='';
      if(cat==='llm')curVal=(_currentConfig.model||{}).name||'';
      else if(cat==='img')curVal=(_currentConfig.image_gen||{}).model||'';
      else if(cat==='tts')curVal=(_currentConfig.tts||{}).model||'';
      if(p[nameField]&&p[nameField]===curVal){activeIdx=i;break}
    }
  }
  var html='';
  for(var i=0;i<presets.length;i++){
    var p=presets[i];
    var isActive=i===activeIdx;
    html+='<div class="preset-card'+(isActive?' active-preset':'')+'">'+
      '<span class="pc-name">'+_escHtml(p.name)+'</span>'+
      '<span class="pc-badge">生效中</span>'+
      '<button class="pc-btn apply" onclick="applyPreset(\''+cat+'\','+i+')">应用</button>'+
      '<button class="pc-btn del" onclick="delPreset(\''+cat+'\','+i+')">删除</button>'+
      '</div>';
  }
  container.innerHTML=html;
}

function _escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

window.savePreset=savePreset;
function savePreset(cat){
  var nameInput=cat==='llm'?'cfgPresetName':cat==='img'?'cfgPresetNameImg':'cfgPresetNameTts';
  var name=$(nameInput).value.trim();
  if(!name){setStatus('请输入预设名称','err');return}
  var data={name:name,category:cat};
  var fields=PRESET_CATS[cat].fields;
  for(var i=0;i<fields.length;i++){var el=$(fields[i]);if(el&&el.value.trim())data[fields[i]]=el.value.trim()}
  var x=new XMLHttpRequest();
  x.open('POST',HOST+'/api/presets');
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    try{var d=JSON.parse(x.responseText);if(d.error){setStatus('保存失败: '+d.error,'err');return}}catch(e){}
    $(nameInput).value='';
    setStatus('✓ 已保存预设: '+name,'ok');
    setTimeout(function(){setStatus('')},3000);
    refreshPresetList(cat);
  };
  x.onerror=function(){setStatus('保存失败','err')};
  x.send(JSON.stringify(data));
}

window.applyPreset=applyPreset;
function applyPreset(cat,idx){
  var p=_presetCache[cat][idx];if(!p)return;
  // 1. 填入字段
  var fields=PRESET_CATS[cat].fields;
  for(var i=0;i<fields.length;i++){var el=$(fields[i]);if(el&&p[fields[i]])el.value=p[fields[i]]}
  // 2. 后端应用 + 重载
  setStatus('应用 '+p.name+' 中...');
  var x=new XMLHttpRequest();
  x.open('POST',HOST+'/api/presets/apply');
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    var r=new XMLHttpRequest();
    r.open('POST',HOST+'/config/reload');
    r.setRequestHeader('Authorization','Bearer '+TOKEN);
    r.onload=function(){
      setStatus('✓ '+p.name+' 已生效','ok');
      setTimeout(function(){setStatus('')},3000);
      loadConfig();
    };
    r.send();
  };
  x.onerror=function(){setStatus('应用失败','err')};
  x.send(JSON.stringify({name:p.name,category:cat}));
}

window.delPreset=delPreset;
function delPreset(cat,idx){
  var p=_presetCache[cat][idx];if(!p)return;
  if(!confirm('删除预设 "'+p.name+'" ？'))return;
  var x=new XMLHttpRequest();
  x.open('DELETE',HOST+'/api/presets/'+encodeURIComponent(p.name));
  x.setRequestHeader('Authorization','Bearer '+TOKEN);
  x.onload=function(){
    setStatus('✓ 已删除: '+p.name,'ok');
    setTimeout(function(){setStatus('')},3000);
    refreshPresetList(cat);
  };
  x.send();
}

function refreshAllPresets(){refreshPresetList('llm');refreshPresetList('img');refreshPresetList('tts')}

// ─── 上下文用量显示 ───
function refreshContext(){
  if(!TOKEN)return;
  var sid=SESSION_ID||'_default';
  var cx=new XMLHttpRequest();
  cx.open('GET',HOST+'/api/context?session_id='+encodeURIComponent(sid));
  cx.setRequestHeader('Authorization','Bearer '+TOKEN);
  cx.onload=function(){
    if(cx.status!==200)return;
    try{
      var d=JSON.parse(cx.responseText);
      var bar=$('ctxBar');
      if(!bar)return;
      var pct=d.usage_pct||0;
      var color=pct<50?'green':pct<80?'yellow':'red';
      var promptT=d.prompt_tokens||0;
      var compT=d.completion_tokens||0;
      var totalT=d.estimated_tokens||0;
      var max=d.max_context_tokens||0;
      var msgs=d.message_count||0;
      if(promptT>0){
        bar.innerHTML=
          '<span class="ctx-item"><span class="ctx-dot '+color+'"></span> 上下文: '+promptT.toLocaleString()+' in / '+compT.toLocaleString()+' out / '+max.toLocaleString()+' max ('+pct+'%)</span>'+
          '<span class="ctx-item">消息: '+msgs+'条</span>';
      }else{
        bar.innerHTML=
          '<span class="ctx-item"><span class="ctx-dot '+color+'"></span> 上下文: ~'+totalT.toLocaleString()+'/'+max.toLocaleString()+' tokens ('+pct+'%)</span>'+
          '<span class="ctx-item">消息: '+msgs+'条</span>';
      }
      bar.style.display='flex';
    }catch(e){}
  };
  cx.send();
}

if(typeof loadSessions==='function'){
  loadSessions=function(){_origLoadSessions();refreshContext();};
