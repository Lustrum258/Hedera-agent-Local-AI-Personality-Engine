identity:
  memory: data/MEMORY.md
  name: 冬青
  soul: data/SOUL.md
image_gen:
  api_key: ""  # 或使用环境变量 HEDERA_IMAGE_KEY
  api_key_env: HEDERA_IMAGE_KEY
  enabled: false
  endpoint: ""  # 留空则自动从模型endpoint推导
  model: "dall-e-3"
  n: 1
  provider: openai
  quality: standard
  size: 1024x1024
model:
  api_key: ""  # 或使用环境变量 HEDERA_API_KEY
  api_key_env: HEDERA_API_KEY
  endpoint: https://api.deepseek.com/v1/chat/completions
  max_tokens: 8192
  name: deepseek-chat
  temperature: 0.7
noise:
  complex_strength: 0.08
  creative_strength: 0.25
  enabled: true
  simple_task_strength: 0.0
search:
  providers:
    scrape:
      enabled: true
      priority: 99
    tavily:
      api_key: ""  # 或使用环境变量 TAVILY_API_KEY
      api_key_env: TAVILY_API_KEY
      enabled: false
      max_results: 5
      priority: 1
server:
  host: 0.0.0.0
  password: ""  # 设置你的密码
  port: 36313
slider:
  auto_adjust: true
  dimensions:
    correction: 0.5
    drive: 0.6
    goal: 0.3
    processing: 0.3
    thinking: 0.4
    value: 0.2
training:
  enabled: true
  module_a: true
  module_c: true
  module_d: true
  pulse_interval: 300
tts:
  api_key_env: HEDERA_TTS_KEY
  enabled: false
  provider: openai
  api_key: ""
  model: tts-1
  voice: alloy
  endpoint: ""
